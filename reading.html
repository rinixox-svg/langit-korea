<!doctype html>
<html lang="id">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Reading - Langit Korea</title>
        <link rel="stylesheet" href="css/style.css" />
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
        />
    </head>
    <body>
        <!-- Header -->
        <header class="header">
            <div class="header-left">
                <a href="home.html" class="back-btn">
                    <i class="fas fa-arrow-left"></i>
                </a>
                <h1>Reading Practice</h1>
            </div>
            <div class="header-right">
                <span class="score-badge" id="scoreDisplay">Score: 0</span>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Progress Bar -->
            <div class="progress-container">
                <div class="progress-bar" id="progressBar"></div>
                <span class="progress-text" id="progressText"
                    >Question 1/10</span
                >
            </div>

            <!-- Reading Passage -->
            <div class="reading-passage card" id="passageContainer">
                <h3 class="passage-title">Reading Passage</h3>
                <div class="passage-content" id="passageContent">
                    <!-- Passage will be loaded here -->
                </div>
                <button class="btn-translate" id="translatePassageBtn">
                    <i class="fas fa-language"></i> Translate
                </button>
                <div
                    class="translation"
                    id="passageTranslation"
                    style="display: none"
                ></div>
            </div>

            <!-- Question Image (if any) - Positioned after passage -->
            <div
                class="image-container card"
                id="imageContainer"
                style="display: none"
            >
                <h3 class="image-title">
                    <i class="fas fa-image"></i> Question Image
                </h3>
                <img
                    id="questionImage"
                    src=""
                    alt="Question Image"
                    style="
                        max-width: 100%;
                        height: auto;
                        border-radius: 8px;
                        margin-top: 1rem;
                    "
                />
            </div>

            <!-- Question -->
            <div class="question-container card">
                <h3 class="question-number" id="questionNumber">Question 1</h3>
                <p class="question-text" id="questionText">
                    Loading question...
                </p>

                <button class="btn-translate" id="translateQuestionBtn">
                    <i class="fas fa-language"></i> Translate Question
                </button>
                <div
                    class="translation"
                    id="questionTranslation"
                    style="display: none"
                ></div>
            </div>

            <!-- Options -->
            <div class="options-container" id="optionsContainer">
                <!-- Options will be loaded here -->
            </div>

            <!-- Navigation Buttons -->
            <div class="navigation-buttons">
                <button class="btn btn-secondary" id="prevBtn" disabled>
                    <i class="fas fa-chevron-left"></i> Previous
                </button>
                <button class="btn btn-primary" id="nextBtn">
                    Next <i class="fas fa-chevron-right"></i>
                </button>
            </div>

            <!-- Result Modal -->
            <div class="modal" id="resultModal" style="display: none">
                <div class="modal-content">
                    <h2>Reading Practice Complete!</h2>
                    <div class="result-score">
                        <span class="score-number" id="finalScore">0</span>
                        <span class="score-total">/10</span>
                    </div>
                    <p class="result-message" id="resultMessage">
                        Keep practicing!
                    </p>
                    <div class="modal-buttons">
                        <button class="btn btn-primary" id="retryBtn">
                            Try Again
                        </button>
                        <button class="btn btn-secondary" id="homeBtn">
                            Back to Home
                        </button>
                    </div>
                </div>
            </div>
        </main>

        <!-- Load Question Bank -->
        <script src="js/question-bank.js"></script>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
            <a href="home.html" class="nav-item">
                <i class="fas fa-home"></i>
                <span>Home</span>
            </a>
            <a href="listening.html" class="nav-item">
                <i class="fas fa-headphones"></i>
                <span>Listening</span>
            </a>
            <a href="reading.html" class="nav-item active">
                <i class="fas fa-book-open"></i>
                <span>Reading</span>
            </a>
            <a href="vocabulary.html" class="nav-item">
                <i class="fas fa-spell-check"></i>
                <span>Vocab</span>
            </a>
            <a href="latihan-eps.html" class="nav-item">
                <i class="fas fa-pencil-alt"></i>
                <span>Practice</span>
            </a>
        </nav>

        <script src="js/reading.js"></script>
    </body>
</html>
