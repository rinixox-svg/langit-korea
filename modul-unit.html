<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Langit Korea — Modul Belajar</title>
  <link rel="stylesheet" href="assets/css/main.css" />
  <link rel="stylesheet" href="assets/css/modul-unit.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script type="module" src="assets/js/supabase.js"></script>
  <script type="module" src="assets/js/auth.js"></script>
  <script type="module" src="assets/js/utils.js"></script>
  <script type="module" src="assets/js/modul-unit.js"></script>
</head>
<body>
  <div id="app">
    <div class="container">
      <!-- Progress Bar -->
      <div class="progress-wrap">
        <div class="progress-label">
          <span id="progressLabel">Unit 31 — 0% selesai</span>
        </div>
        <div class="progress-track">
          <div class="progress-fill" id="progressFill"></div>
        </div>
      </div>

      <!-- Sticky Nav -->
      <nav class="seksi-nav" id="seksiNav"></nav>

      <!-- Loading -->
      <div class="module-loading" id="loadingDiv">
        <div class="spinner"></div>
        <p>Memuat materi...</p>
      </div>

      <!-- Error -->
      <div class="module-empty" id="errorDiv" style="display:none">
        <p>Gagal memuat materi. Pastikan koneksi internet aktif.</p>
        <button class="btn btn-primary" onclick="location.reload()" style="margin-top:16px">Coba Lagi</button>
      </div>

      <!-- Content -->
      <div id="contentArea"></div>

      <!-- Back -->
      <div style="margin: 24px 0">
        <button class="btn btn-outline" onclick="navigateTo('dashboard.html')">
          &larr; Kembali ke Dashboard
        </button>
      </div>
    </div>
  </div>

  <script type="module">
    import { supabase } from './assets/js/supabase.js';
    import { navigateTo, showToast } from './assets/js/utils.js';
    import { renderModule } from './assets/js/modul-unit.js';

    window.navigateTo = navigateTo;

    (async function init() {
      const params = new URLSearchParams(location.search);
      const unit = parseInt(params.get('unit')) || 31;
      await renderModule(unit);
    })();
  </script>
</body>
</html>
