<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Langit Korea</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="js/auth/firebase-config.js"></script>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .login-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 3rem 2rem;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }

        .login-logo {
            font-size: 2.5rem;
            color: #667eea;
            margin-bottom: 0.5rem;
            font-weight: 700;
        }

        .login-subtitle {
            color: #666;
            margin-bottom: 2rem;
            font-size: 1rem;
        }

        .login-welcome {
            color: #333;
            font-size: 1.2rem;
            margin-bottom: 0.5rem;
        }

        .user-info {
            margin-bottom: 2rem;
        }

        .user-photo {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            margin: 0 auto 1rem;
            object-fit: cover;
            border: 3px solid #667eea;
        }

        .user-name {
            font-size: 1.1rem;
            color: #333;
            font-weight: 600;
            margin-bottom: 0.3rem;
        }

        .user-email {
            font-size: 0.9rem;
            color: #666;
        }

        .google-btn {
            background: white;
            color: #333;
            border: 2px solid #ddd;
            padding: 0.8rem 2rem;
            border-radius: 25px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.8rem;
            margin: 0 auto;
            width: 100%;
            max-width: 300px;
        }

        .google-btn:hover {
            background: #f5f5f5;
            border-color: #667eea;
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .google-btn img {
            width: 20px;
            height: 20px;
        }

        .logout-btn {
            background: #f44336;
            color: white;
            border: none;
            padding: 0.8rem 2rem;
            border-radius: 25px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            width: 100%;
            max-width: 300px;
            margin: 1rem auto 0;
        }

        .logout-btn:hover {
            background: #d32f2f;
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(244, 67, 54, 0.3);
        }

        .login-footer {
            margin-top: 2rem;
            font-size: 0.85rem;
            color: #999;
        }

        .login-footer a {
            color: #667eea;
            text-decoration: none;
        }

        .login-footer a:hover {
            text-decoration: underline;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <!-- Logged Out State -->
        <div id="loggedOutSection">
            <div class="login-logo">Langit Korea</div>
            <div class="login-subtitle">EPS-TOPIK Learning Platform</div>

            <h2 class="login-welcome">Selamat Datang! 👋</h2>
            <p style="color: #666; margin-bottom: 2rem;">Silakan login untuk melanjutkan belajar</p>

            <button class="google-btn" onclick="signInWithGoogle()">
                <img src="https://www.gstatic.com/firebasejs/9.22.0/firebasejs-symbols.svg" alt="G" style="width: 18px; height: 18px;">
                Login dengan Google
            </button>
        </div>

        <!-- Logged In State -->
        <div id="loggedInSection" class="hidden">
            <div class="login-logo">Langit Korea</div>
            <div class="login-subtitle">EPS-TOPIK Learning Platform</div>

            <div class="user-info">
                <img id="userPhoto" class="user-photo" src="" alt="Profile">
                <div class="user-name" id="userName">User</div>
                <div class="user-email" id="userEmail">email@example.com</div>
            </div>

            <button class="logout-btn" onclick="signOut()">
                <i class="fas fa-sign-out-alt"></i> Logout
            </button>
        </div>

        <div class="login-footer">
            <a href="home.html">← Kembali ke Home</a>
        </div>
    </div>

    <script>
        // Check auth state on page load
        auth.onAuthStateChanged((user) => {
            const loggedOutSection = document.getElementById('loggedOutSection');
            const loggedInSection = document.getElementById('loggedInSection');

            if (user) {
                // User is logged in
                loggedOutSection.classList.add('hidden');
                loggedInSection.classList.remove('hidden');

                document.getElementById('userName').textContent = user.displayName || 'User';
                document.getElementById('userEmail').textContent = user.email;
                document.getElementById('userPhoto').src = user.photoURL || 'https://via.placeholder.com/80';
            } else {
                // User is logged out
                loggedOutSection.classList.remove('hidden');
                loggedInSection.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
