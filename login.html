<!doctype html>
<html lang="id">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Login - Langit Korea</title>
        <style>
            body {
                font-family: Arial, sans-serif;
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                min-height: 100vh;
                display: flex;
                justify-content: center;
                align-items: center;
                margin: 0;
                padding: 1rem;
            }

            .container {
                background: white;
                border-radius: 12px;
                padding: 2rem;
                text-align: center;
                box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
                width: 100%;
                max-width: 400px;
            }

            h1 {
                color: #667eea;
                margin-bottom: 0.5rem;
            }

            p {
                color: #666;
                margin-bottom: 1.5rem;
            }

            button {
                display: block;
                width: 100%;
                padding: 1rem;
                margin: 1rem 0;
                border: none;
                border-radius: 8px;
                font-size: 1rem;
                font-weight: 600;
                cursor: pointer;
            }

            .google-btn {
                background: white;
                color: #333;
                border: 2px solid #ddd;
            }

            .anon-btn {
                background: #4caf50;
                color: white;
            }

            .hint {
                background: #fff3cd;
                border: 1px solid #ffeaa7;
                border-radius: 8px;
                padding: 0.8rem;
                margin: 1rem 0;
                font-size: 0.9rem;
                color: #856404;
            }

            .divider {
                margin: 1.5rem 0;
                color: #999;
                font-size: 0.9rem;
            }
        </style>

        <!-- Firebase SDK -->
        <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
        <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
        <script src="js/auth/firebase-config.js"></script>
    </head>
    <body>
        <div class="container">
            <h1>Langit Korea</h1>
            <p>EPS-TOPIK Learning Platform</p>

            <div class="hint">
                <strong>📱 Untuk HP:</strong> Jika tombol Google tidak bisa,
                gunakan "Login Tanpa Akun"
            </div>

            <button class="google-btn" id="googleBtn">
                🔵 Login dengan Google
            </button>

            <div class="divider">ATAU</div>

            <button class="anon-btn" id="anonBtn">
                👤 Login Tanpa Akun (Testing)
            </button>
        </div>

        <script>
            // Google Login
            document
                .getElementById("googleBtn")
                .addEventListener("click", () => {
                    const provider = new firebase.auth.GoogleAuthProvider();

                    // Try popup first
                    auth.signInWithPopup(provider)
                        .then((result) => {
                            console.log("Sign-in successful:", result.user);
                            window.location.href = "home.html";
                        })
                        .catch((error) => {
                            console.error("Popup error:", error);

                            // If popup blocked, use redirect
                            if (
                                error.code === "auth/popup-blocked" ||
                                error.code === "auth/cancelled-popup-request"
                            ) {
                                console.log("Popup blocked, using redirect...");
                                auth.signInWithRedirect(provider);
                            } else {
                                alert("Login gagal: " + error.message);
                            }
                        });
                });

            // Anonymous Login (for mobile)
            document.getElementById("anonBtn").addEventListener("click", () => {
                auth.signInAnonymously()
                    .then(() => {
                        console.log("Anonymous sign-in successful");
                        window.location.href = "home.html";
                    })
                    .catch((error) => {
                        console.error("Anonymous error:", error);
                        alert("Login gagal: " + error.message);
                    });
            });

            // Handle redirect result (for mobile)
            auth.getRedirectResult()
                .then((result) => {
                    if (result.user) {
                        console.log(
                            "Redirect sign-in successful:",
                            result.user,
                        );
                        window.location.href = "home.html";
                    }
                })
                .catch((error) => {
                    console.error("Redirect error:", error);
                });

            // Check if already logged in
            auth.onAuthStateChanged((user) => {
                if (user) {
                    console.log("Already logged in:", user.displayName);
                    window.location.href = "home.html";
                }
            });
        </script>
    </body>
</html>
