<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Langit Korea - Login</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">

    <!-- Supabase Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>

    <style>
        :root {
            --langit-biru: #4A90D9;
            --langit-fajar: #FF8C61;
            --putih-bersih: #F8F9FF;
            --teks-utama: #1E2A3A;
            --teks-sekunder: #6B7A8D;
            --hijau-berhasil: #4CAF82;
            --merah-salah: #E05C5C;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--putih-bersih);
            color: var(--teks-utama);
            padding: 20px;
            max-width: 480px;
            margin: 0 auto;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo {
            font-size: 32px;
            font-weight: 700;
            color: var(--langit-biru);
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 14px;
            color: var(--teks-sekunder);
        }

        .login-card {
            background: white;
            border-radius: 20px;
            padding: 30px 24px;
            box-shadow: 0 10px 30px rgba(74, 144, 217, 0.15);
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--teks-utama);
        }

        input[type="email"],
        input[type="password"],
        input[type="text"] {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #E0E0E0;
            border-radius: 12px;
            font-size: 16px;
            font-family: 'Plus Jakarta Sans', sans-serif;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--langit-biru);
        }

        .btn-login {
            width: 100%;
            padding: 16px;
            background-color: var(--langit-biru);
            color: white;
            font-size: 18px;
            font-weight: 700;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: transform 0.2s;
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin-top: 10px;
        }

        .btn-login:hover {
            transform: translateY(-2px);
        }

        .btn-login:disabled {
            background-color: #D0D0D0;
            cursor: not-allowed;
            transform: none;
        }

        .links {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: var(--teks-sekunder);
        }

        .links a {
            color: var(--langit-biru);
            text-decoration: none;
            font-weight: 600;
        }

        .links a:hover {
            text-decoration: underline;
        }

        .error-msg {
            background: #ffebee;
            color: var(--merah-salah);
            padding: 12px;
            border-radius: 12px;
            font-size: 14px;
            margin-bottom: 15px;
            display: none;
        }

        .success-msg {
            background: #e8f5e9;
            color: var(--hijau-berhasil);
            padding: 12px;
            border-radius: 12px;
            font-size: 14px;
            margin-bottom: 15px;
            display: none;
        }

        .loading {
            display: none;
            text-align: center;
            font-size: 14px;
            color: var(--teks-sekunder);
            margin-top: 10px;
        }

        .divider {
            text-align: center;
            margin: 20px 0;
            font-size: 12px;
            color: var(--teks-sekunder);
            position: relative;
        }

        .divider::before,
        .divider::after {
            content: "";
            position: absolute;
            top: 50%;
            width: 40%;
            height: 1px;
            background: #E0E0E0;
        }

        .divider::before { left: 0; }
        .divider::after { right: 0; }

        .btn-google {
            width: 100%;
            padding: 14px;
            background: white;
            color: var(--teks-utama);
            font-size: 16px;
            font-weight: 600;
            border: 2px solid #E0E0E0;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Plus Jakarta Sans', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-google:hover {
            border-color: var(--langit-biru);
            background: #f8fbff;
        }

        .hidden { display: none; }
    </style>
</head>
<body>

<div class="header">
    <div class="logo">🌌 Langit Korea</div>
    <div class="subtitle">Masuk ke akunmu</div>
</div>

<div class="login-card">
    <div class="error-msg" id="errorMsg"></div>
    <div class="success-msg" id="successMsg"></div>

    <form id="loginForm">
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="email@contoh.com" required>
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Masukkan password" required>
        </div>

        <button type="submit" class="btn-login" id="loginBtn">
            🔐 Masuk Sekarang
        </button>
    </form>

    <div class="loading" id="loading">Sedang diproses...</div>

    <div class="links">
        <a href="#" onclick="showReset()">Lupa Password?</a>
    </div>
</div>

<div class="divider">ATAU</div>

<button class="btn-google" onclick="signInWithGoogle()">
    <span>🔍</span> Masuk dengan Google
</button>

<div class="links" style="margin-top: 30px;">
    Belum punya akun? <a href="onboarding.html">Daftar Sekarang</a>
</div>

<script>
    // Cek apakah user sudah login
    document.addEventListener('DOMContentLoaded', async function() {
        try {
            const { data: { session } } = await supabase.auth.getSession();
            if (session) {
                // Sudah login, redirect ke home
                window.location.href = 'home.html';
            }
        } catch (error) {
            console.error('Error cek session:', error);
        }
    });

    // Handle Login Form
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
        e.preventDefault();

        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const loginBtn = document.getElementById('loginBtn');
        const loading = document.getElementById('loading');
        const errorMsg = document.getElementById('errorMsg');

        // Reset messages
        errorMsg.style.display = 'none';
        loginBtn.disabled = true;
        loading.style.display = 'block';

        try {
            const { data, error } = await supabase.auth.signInWithPassword({
                email: email,
                password: password
            });

            loading.style.display = 'none';
            loginBtn.disabled = false;

            if (error) throw error;

            // Login sukses
            window.location.href = 'home.html';

        } catch (error) {
            loading.style.display = 'none';
            loginBtn.disabled = false;
            errorMsg.innerText = 'Login gagal: ' + error.message;
            errorMsg.style.display = 'block';
        }
    });

    // Reset Password
    function showReset() {
        const email = prompt('Masukkan email kamu untuk reset password:');
        if (email) {
            resetPassword(email);
        }
    }

    async function resetPassword(email) {
        const errorMsg = document.getElementById('errorMsg');
        const successMsg = document.getElementById('successMsg');

        try {
            const { error } = await supabase.auth.resetPasswordForEmail(email, {
                redirectTo: window.location.origin + '/reset-password.html'
            });

            if (error) throw error;

            successMsg.innerText = 'Link reset password sudah dikirim ke ' + email;
            successMsg.style.display = 'block';
            errorMsg.style.display = 'none';
        } catch (error) {
            errorMsg.innerText = 'Gagal mengirim: ' + error.message;
            errorMsg.style.display = 'block';
            successMsg.style.display = 'none';
        }
    }

    // Google Sign In (Opsional)
    async function signInWithGoogle() {
        try {
            const { error } = await supabase.auth.signInWithOAuth({
                provider: 'google'
            });
            if (error) throw error;
        } catch (error) {
            document.getElementById('errorMsg').innerText = 'Login Google gagal: ' + error.message;
            document.getElementById('errorMsg').style.display = 'block';
        }
    }
</script>

</body>
</html>
