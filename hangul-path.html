<!doctype html>
<html lang="id">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Belajar Hangul - Langit Korea</title>
        <link rel="stylesheet" href="css/style.css" />
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
        />
        <style>
            /* Hangul Path Specific Styles */
            .lesson-header {
                text-align: center;
                padding: 2rem 1rem;
                background: rgba(255, 255, 255, 0.95);
                border-radius: 20px;
                margin-bottom: 2rem;
                box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            }

            .lesson-header h1 {
                color: #333;
                font-size: 1.8rem;
                margin-bottom: 0.5rem;
            }

            .lesson-header p {
                color: #666;
                font-size: 1rem;
            }

            .progress-text {
                text-align: center;
                color: white;
                margin-bottom: 1rem;
                font-size: 0.9rem;
            }

            .hangul-card {
                background: rgba(255, 255, 255, 0.95);
                backdrop-filter: blur(10px);
                border-radius: 15px;
                padding: 2rem 1.5rem;
                margin-bottom: 1.5rem;
                box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
                text-align: center;
                border-left: 4px solid #667eea;
            }

            .hangul-character {
                font-size: 5rem;
                color: #667eea;
                font-family: "Noto Sans KR", sans-serif;
                margin-bottom: 1rem;
                line-height: 1;
            }

            .romanization {
                font-size: 1.5rem;
                color: #764ba2;
                font-weight: 600;
                margin-bottom: 0.5rem;
            }

            .pronunciation {
                font-size: 1rem;
                color: #666;
                margin-bottom: 1.5rem;
                font-style: italic;
            }

            .description {
                font-size: 1rem;
                color: #333;
                line-height: 1.8;
                margin-bottom: 1.5rem;
                padding: 1rem;
                background: #f8f9fa;
                border-radius: 8px;
                text-align: left;
            }

            .example-section {
                background: #e3f2fd;
                padding: 1rem;
                border-radius: 8px;
                margin-bottom: 1.5rem;
                text-align: left;
            }

            .example-section h3 {
                color: #1565c0;
                font-size: 1rem;
                margin-bottom: 0.8rem;
            }

            .example-item {
                margin-bottom: 0.8rem;
                padding: 0.8rem;
                background: white;
                border-radius: 5px;
            }

            .example-korean {
                font-family: "Noto Sans KR", sans-serif;
                font-size: 1.3rem;
                color: #333;
                font-weight: 600;
                margin-bottom: 0.3rem;
            }

            .example-roman {
                font-size: 0.9rem;
                color: #666;
                margin-top: 0.3rem;
            }

            .example-meaning {
                font-size: 0.9rem;
                color: #1565c0;
                margin-top: 0.3rem;
                font-style: italic;
            }

            .tip-box {
                background: #fff3e0;
                padding: 1rem;
                border-radius: 8px;
                margin-top: 1.5rem;
                font-size: 0.9rem;
                color: #e65100;
                text-align: left;
            }

            .tip-box i {
                margin-right: 0.5rem;
            }

            .navigation-buttons {
                display: flex;
                justify-content: space-between;
                gap: 1rem;
                margin-top: 2rem;
            }

            .nav-btn {
                padding: 0.8rem 2rem;
                border: none;
                border-radius: 25px;
                font-size: 1rem;
                font-weight: 600;
                cursor: pointer;
                transition: all 0.3s;
                display: flex;
                align-items: center;
                gap: 0.5rem;
                flex: 1;
                justify-content: center;
            }

            .nav-btn.primary {
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                color: white;
            }

            .nav-btn.primary:hover:not(:disabled) {
                transform: translateY(-2px);
                box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
            }

            .nav-btn.secondary {
                background: white;
                color: #667eea;
                border: 2px solid #667eea;
            }

            .nav-btn.secondary:hover:not(:disabled) {
                background: #f5f5f5;
            }

            .nav-btn:disabled {
                opacity: 0.5;
                cursor: not-allowed;
            }

            .completion-message {
                text-align: center;
                padding: 3rem 2rem;
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                color: white;
                border-radius: 20px;
                margin: 2rem 0;
            }

            .completion-message h2 {
                font-size: 2rem;
                margin-bottom: 1rem;
            }

            .completion-message p {
                font-size: 1.1rem;
                margin-bottom: 2rem;
                opacity: 0.9;
            }

            .completion-message .cta-button {
                display: inline-block;
                background: white;
                color: #667eea;
                padding: 0.8rem 2rem;
                border-radius: 25px;
                text-decoration: none;
                font-weight: 600;
                transition: all 0.3s;
            }

            .completion-message .cta-button:hover {
                transform: translateY(-2px);
                box-shadow: 0 4px 15px rgba(255, 255, 255, 0.3);
            }

            @media (max-width: 600px) {
                .hangul-character {
                    font-size: 4rem;
                }

                .romanization {
                    font-size: 1.2rem;
                }

                .nav-btn {
                    padding: 0.7rem 1.5rem;
                    font-size: 0.9rem;
                }
            }
        </style>
    </head>
    <body>
        <!-- Header -->
        <header class="header">
            <div class="header-left">
                <a href="home.html" class="back-btn">
                    <i class="fas fa-arrow-left"></i>
                </a>
                <h1>Belajar Hangul</h1>
            </div>
            <div class="header-right">
                <span class="score-badge">EPS-TOPIK</span>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Lesson Header -->
            <div class="lesson-header">
                <h1>Jalur Belajar Hangul 🌱</h1>
                <p>Pelajari huruf Korea langkah demi langkah</p>
            </div>

            <!-- Progress -->
            <div class="progress-container">
                <div class="progress-bar" id="progressBar"></div>
                <span class="progress-text" id="progressText"
                    >Pelajaran 1/24</span
                >
            </div>

            <!-- Lesson Content -->
            <div id="lessonContent">
                <!-- Lesson will be loaded here -->
            </div>

            <!-- Completion Message (hidden by default) -->
            <div
                class="completion-message"
                id="completionMessage"
                style="display: none"
            >
                <h2>Selamat! 🎉</h2>
                <p>Kamu sudah menyelesaikan semua pelajaran Hangul dasar!</p>
                <p>Sekarang kamu sudah bisa membaca dan menulis Hangul.</p>
                <a href="home.html" class="cta-button"
                    >Mulai Latihan EPS-TOPIK</a
                >
            </div>
        </main>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
            <a href="home.html" class="nav-item">
                <i class="fas fa-home"></i>
                <span>Home</span>
            </a>
            <a href="listening.html" class="nav-item">
                <i class="fas fa-headphones"></i>
                <span>Listening</span>
            </a>
            <a href="reading.html" class="nav-item">
                <i class="fas fa-book-open"></i>
                <span>Reading</span>
            </a>
            <a href="latihan-eps.html" class="nav-item">
                <i class="fas fa-pencil-alt"></i>
                <span>Practice</span>
            </a>
        </nav>

        <script>
            // Hangul Data - Standard Curriculum with Correct Examples
            const hangulData = [
                // Basic Vowels (10) - Standard Order
                {
                    type: "vowel",
                    hangul: "ㅏ",
                    romanization: "a",
                    pronunciation: "seperti 'a' pada 'ayah'",
                    description: "Vokal dasar pertama. Mulut terbuka lebar.",
                    examples: [
                        { combo: "가", roman: "ga", meaning: "gigi" },
                        { combo: "나", roman: "na", meaning: "aku/kami" },
                    ],
                },
                {
                    type: "vowel",
                    hangul: "ㅑ",
                    romanization: "ya",
                    pronunciation: "seperti 'ya' pada 'yakin'",
                    description:
                        "Vokal 'a' dengan tambahan 'y'. Lidah lebih mendekat ke langit-langit.",
                    examples: [
                        { combo: "야", roman: "ya", meaning: "hey/kamu" },
                        { combo: "자", roman: "ja", meaning: "tidur" },
                    ],
                },
                {
                    type: "vowel",
                    hangul: "ㅓ",
                    romanization: "eo",
                    pronunciation: "seperti 'eo' pada 'orang'",
                    description: "Vokal tengah. Mulut setengah terbuka.",
                    examples: [
                        { combo: "거", roman: "geo", meaning: "itu" },
                        { combo: "너", roman: "neo", meaning: "kamu" },
                    ],
                },
                {
                    type: "vowel",
                    hangul: "ㅕ",
                    romanization: "yeo",
                    pronunciation: "seperti 'yeo' pada 'yen'",
                    description: "Vokal 'eo' dengan tambahan 'y'.",
                    examples: [
                        { combo: "여", roman: "yeo", meaning: "wanita" },
                        { combo: "저", roman: "jeo", meaning: "aku" },
                    ],
                },
                {
                    type: "vowel",
                    hangul: "ㅗ",
                    romanization: "o",
                    pronunciation: "seperti 'o' pada 'botol'",
                    description: "Vokal belakang. Bibir membulat.",
                    examples: [
                        {
                            combo: "고",
                            roman: "go",
                            meaning: "kata benda untuk menyebut kata benda",
                        },
                        { combo: "오", roman: "o", meaning: "oh/lima" },
                    ],
                },
                {
                    type: "vowel",
                    hangul: "ㅛ",
                    romanization: "yo",
                    pronunciation: "seperti 'yo' pada 'yoyo'",
                    description: "Vokal 'o' dengan tambahan 'y'.",
                    examples: [
                        {
                            combo: "요",
                            roman: "yo",
                            meaning: "permintaan sopan",
                        },
                        { combo: "교", roman: "gyo", meaning: "sekolah" },
                    ],
                },
                {
                    type: "vowel",
                    hangul: "ㅜ",
                    romanization: "u",
                    pronunciation: "seperti 'u' pada 'ular'",
                    description: "Vokal bulat tertutup. Bibir menyempit.",
                    examples: [
                        { combo: "구", roman: "gu", meaning: "bola" },
                        { combo: "누", roman: "nu", meaning: "siapa" },
                    ],
                },
                {
                    type: "vowel",
                    hangul: "ㅠ",
                    romanization: "yu",
                    pronunciation: "seperti 'yu' pada 'yudo'",
                    description: "Vokal 'u' dengan tambahan 'y'.",
                    examples: [
                        { combo: "유", roman: "yu", meaning: "minyak" },
                        { combo: "큐", roman: "kyu", meaning: "Q (huruf Q)" },
                    ],
                },
                {
                    type: "vowel",
                    hangul: "ㅡ",
                    romanization: "eu",
                    pronunciation: "seperti 'eu' pada 'emas' (bunyi 'e' tebal)",
                    description:
                        "Vokal tengah tertutup. Lidah berada di tengah mulut.",
                    examples: [
                        { combo: "그", roman: "geu", meaning: "itu" },
                        { combo: "스", roman: "seu", meaning: "susu" },
                    ],
                },
                {
                    type: "vowel",
                    hangul: "ㅣ",
                    romanization: "i",
                    pronunciation: "seperti 'i' pada 'ikan'",
                    description: "Vokal depan tertutup. Senyum lebar!",
                    examples: [
                        { combo: "기", roman: "gi", meaning: "kunci" },
                        { combo: "니", roman: "ni", meaning: "kamu (obyek)" },
                    ],
                },

                // Basic Consonants (14) - Standard Order
                {
                    type: "consonant",
                    hangul: "ㄱ",
                    romanization: "g/k",
                    pronunciation:
                        "seperti 'g' pada 'gula' atau 'k' pada 'kaki'",
                    description: "Konsonan letup langit-langit lunak.",
                    examples: [
                        { combo: "가", roman: "ga", meaning: "gigi" },
                        { combo: "고기", roman: "gogi", meaning: "daging" },
                    ],
                },
                {
                    type: "consonant",
                    hangul: "ㄴ",
                    romanization: "n",
                    pronunciation: "seperti 'n' pada 'nasi'",
                    description: "Konsonan hidung lidah.",
                    examples: [
                        { combo: "나", roman: "na", meaning: "aku/kami" },
                        {
                            combo: "누나",
                            roman: "nuna",
                            meaning: "kakak perempuan",
                        },
                    ],
                },
                {
                    type: "consonant",
                    hangul: "ㄷ",
                    romanization: "d/t",
                    pronunciation:
                        "seperti 'd' pada 'dadu' atau 't' pada 'tahu'",
                    description: "Konsonan letup lidah.",
                    examples: [
                        { combo: "다", roman: "da", meaning: "semua" },
                        {
                            combo: "두부",
                            roman: "dubu",
                            meaning: "tahu (makanan)",
                        },
                    ],
                },
                {
                    type: "consonant",
                    hangul: "ㄹ",
                    romanization: "r/l",
                    pronunciation:
                        "seperti 'r' yang digulung atau 'l' pada 'lari'",
                    description: "Konsonan getar lidah.",
                    examples: [
                        { combo: "라", roman: "ra/la", meaning: "musik/apa" },
                        { combo: "울리", roman: "ulli", meaning: "menggema" },
                    ],
                },
                {
                    type: "consonant",
                    hangul: "ㅁ",
                    romanization: "m",
                    pronunciation: "seperti 'm' pada 'makan'",
                    description: "Konsonan hidung bibir.",
                    examples: [
                        { combo: "마", roman: "ma", meaning: "kuda" },
                        { combo: "미", roman: "mi", meaning: "keindahan" },
                    ],
                },
                {
                    type: "consonant",
                    hangul: "ㅂ",
                    romanization: "b/p",
                    pronunciation:
                        "seperti 'b' pada 'buku' atau 'p' pada 'padi'",
                    description: "Konsonan letup bibir.",
                    examples: [
                        { combo: "바", roman: "ba/pa", meaning: "biji/lima" },
                        { combo: "비", roman: "bi/pi", meaning: "hujan" },
                    ],
                },
                {
                    type: "consonant",
                    hangul: "ㅅ",
                    romanization: "s",
                    pronunciation: "seperti 's' pada 'susu'",
                    description: "Konsonan gesek gigi.",
                    examples: [
                        {
                            combo: "사",
                            roman: "sa",
                            meaning: "empat/berbelanja",
                        },
                        { combo: "소", roman: "so", meaning: "sapi" },
                    ],
                },
                {
                    type: "consonant",
                    hangul: "ㅇ",
                    romanization: "ng",
                    pronunciation: "seperti 'ng' pada 'bangun'",
                    description:
                        "Konsonan hidung. Bersifat senyap di awal kata.",
                    examples: [
                        { combo: "아", roman: "a", meaning: "Ah / Siapa (아)" },
                        { combo: "영", roman: "yeong", meaning: "muda/zero" },
                    ],
                },
                {
                    type: "consonant",
                    hangul: "ㅈ",
                    romanization: "j",
                    pronunciation: "seperti 'j' pada 'jalan'",
                    description: "Konsonan letup-gigi.",
                    examples: [
                        { combo: "자", roman: "ja", meaning: "tidur" },
                        { combo: "지", roman: "ji", meaning: "bumi" },
                    ],
                },
                {
                    type: "consonant",
                    hangul: "ㅊ",
                    romanization: "ch",
                    pronunciation: "seperti 'ch' pada 'cari'",
                    description: "Konsonan gesek-gigi.",
                    examples: [
                        { combo: "차", roman: "cha", meaning: "teh/mobil" },
                        { combo: "치", roman: "chi", meaning: "gigi" },
                    ],
                },
                {
                    type: "consonant",
                    hangul: "ㅋ",
                    romanization: "k",
                    pronunciation: "seperti 'k' pada 'kuda' (lebih kuat)",
                    description:
                        "Konsonan letup langit-langit lunak tekanan kuat.",
                    examples: [
                        { combo: "카", roman: "ka", meaning: "kartu/kopi" },
                        { combo: "키", roman: "ki", meaning: "kunci/tinggi" },
                    ],
                },
                {
                    type: "consonant",
                    hangul: "ㅌ",
                    romanization: "t",
                    pronunciation: "seperti 't' pada 'tikus' (lebih kuat)",
                    description: "Konsonan letup lidah tekanan kuat.",
                    examples: [
                        { combo: "타", roman: "ta", meaning: "naik/lewat" },
                        { combo: "티", roman: "ti", meaning: "T-shirt" },
                    ],
                },
                {
                    type: "consonant",
                    hangul: "ㅍ",
                    romanization: "p",
                    pronunciation: "seperti 'p' pada 'pintu' (lebih kuat)",
                    description: "Konsonan letup bibir tekanan kuat.",
                    examples: [
                        { combo: "파", roman: "pa", meaning: "bawang" },
                        { combo: "피", roman: "pi", meaning: "darah" },
                    ],
                },
                {
                    type: "consonant",
                    hangul: "ㅎ",
                    romanization: "h",
                    pronunciation: "seperti 'h' pada 'hari'",
                    description: "Konsonan geser tenggorokan.",
                    examples: [
                        { combo: "하", roman: "ha", meaning: "langit-langit" },
                        { combo: "히", roman: "hi", meaning: "hanya" },
                    ],
                },
            ];

            let currentLessonIndex = 0;
            const totalLessons = hangulData.length;

            const lessonContent = document.getElementById("lessonContent");
            const progressBar = document.getElementById("progressBar");
            const progressText = document.getElementById("progressText");
            const completionMessage =
                document.getElementById("completionMessage");

            function updateProgress() {
                const progress =
                    ((currentLessonIndex + 1) / totalLessons) * 100;
                progressBar.style.width = `${progress}%`;
                progressText.textContent = `Pelajaran ${currentLessonIndex + 1}/${totalLessons}`;
            }

            function displayLesson(index) {
                if (index >= totalLessons) {
                    lessonContent.style.display = "none";
                    completionMessage.style.display = "block";
                    progressBar.style.width = "100%";
                    progressText.textContent = "Selesai!";
                    return;
                }

                const lesson = hangulData[index];
                const isFirst = index === 0;
                const isLast = index === totalLessons - 1;

                // Build examples HTML
                let examplesHTML = "";
                if (lesson.examples && lesson.examples.length > 0) {
                    examplesHTML = `
                    <div class="example-section">
                        <h3><i class="fas fa-lightbulb"></i> Contoh Kata</h3>
                `;
                    lesson.examples.forEach((ex) => {
                        examplesHTML += `
                        <div class="example-item">
                            <div class="example-korean">${ex.combo}</div>
                            <div class="example-roman">${ex.roman}</div>
                            <div class="example-meaning">Artinya: ${ex.meaning}</div>
                        </div>
                    `;
                    });
                    examplesHTML += `</div>`;
                }

                lessonContent.innerHTML = `
                <div class="hangul-card">
                    <div class="hangul-character">${lesson.hangul}</div>
                    <div class="romanization">${lesson.romanization}</div>
                    <div class="pronunciation">${lesson.pronunciation}</div>
                    <div class="description">${lesson.description}</div>
                    ${examplesHTML}
                    <div class="tip-box">
                        <i class="fas fa-info-circle"></i>
                        <strong>Tips:</strong> ${lesson.type === "vowel" ? "Cobalah mengucapkan vokal ini sambil melihat ke cermin!" : "Rasakan getaran pada pita suara saat mengucapkan konsonan ini!"}
                    </div>
                    <div class="navigation-buttons">
                        <button class="nav-btn secondary" onclick="previousLesson()" ${isFirst ? "disabled" : ""}>
                            <i class="fas fa-chevron-left"></i> Sebelumnya
                        </button>
                        <button class="nav-btn primary" onclick="nextLesson()">
                            ${isLast ? 'Selesai <i class="fas fa-check"></i>' : 'Lanjut <i class="fas fa-chevron-right"></i>'}
                        </button>
                    </div>
                </div>
            `;

                updateProgress();
            }

            function nextLesson() {
                if (currentLessonIndex < totalLessons - 1) {
                    currentLessonIndex++;
                    displayLesson(currentLessonIndex);
                } else {
                    lessonContent.style.display = "none";
                    completionMessage.style.display = "block";
                    progressBar.style.width = "100%";
                    progressText.textContent = "Selesai!";
                    localStorage.setItem("hangulCompleted", "true");
                }
            }

            function previousLesson() {
                if (currentLessonIndex > 0) {
                    currentLessonIndex--;
                    displayLesson(currentLessonIndex);
                }
            }

            // Initialize first lesson
            displayLesson(currentLessonIndex);
        </script>
    </body>
</html>
