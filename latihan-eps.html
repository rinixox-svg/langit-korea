<!doctype html>
<html lang="id">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Langit Korea — Latihan Soal EPS-TOPIK</title>
        <link rel="stylesheet" href="assets/css/main.css" />
        <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
        <script type="module" src="assets/js/supabase.js"></script>
        <script type="module" src="assets/js/auth.js"></script>
        <script type="module" src="assets/js/utils.js"></script>
    </head>
    <body>
        <a href="#main" class="skip-link">Langsung ke konten</a>

        <div class="container">
            <!-- Header -->
            <div class="header">
                <h1>✏️ Latihan Soal EPS-TOPIK</h1>
                <p id="subtitle">Pilih unit untuk mulai latihan</p>
            </div>

            <!-- Filter Section -->
            <div class="card">
                <div class="section-header">
                    <span class="section-icon">🔍</span>
                    <span class="section-title">Filter Soal</span>
                </div>

                <div class="form-group">
                    <label class="form-label" for="unitFilter"
                        >Pilih Unit (31-60)</label
                    >
                    <select
                        id="unitFilter"
                        class="form-input"
                        onchange="applyFilter()"
                    >
                        <option value="all">Semua Unit (31-60)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label" for="typeFilter">Tipe Soal</label>
                    <select
                        id="typeFilter"
                        class="form-input"
                        onchange="applyFilter()"
                    >
                        <option value="all">Semua Tipe</option>
                        <option value="membaca">Membaca</option>
                        <option value="mendengarkan">Mendengarkan</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label" for="levelFilter"
                        >Tingkat Kesulitan</label
                    >
                    <select
                        id="levelFilter"
                        class="form-input"
                        onchange="applyFilter()"
                    >
                        <option value="all">Semua Level</option>
                        <option value="mudah">Mudah</option>
                        <option value="sedang">Sedang</option>
                        <option value="sulit">Sulit</option>
                    </select>
                </div>
            </div>

            <!-- Stats -->
            <div class="stats" id="statsSection" style="display: none">
                <div class="stat-card">
                    <div class="stat-number" id="statTotal">0</div>
                    <div class="stat-label">Total Soal</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="statMembaca">0</div>
                    <div class="stat-label">Membaca</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="statListening">0</div>
                    <div class="stat-label">Mendengarkan</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="statValid">0%</div>
                    <div class="stat-label">Soal Valid</div>
                </div>
            </div>

            <!-- Loading -->
            <div id="loadingDiv">
                <div class="loading">
                    <div class="spinner"></div>
                    <p id="loadingText">Memuat soal...</p>
                </div>
            </div>

            <!-- Content -->
            <div id="content"></div>

            <!-- Tombol Kembali -->
            <div style="margin-bottom: 24px">
                <button
                    class="btn btn-secondary"
                    onclick="navigateTo('dashboard.html')"
                >
                    ← Kembali ke Dashboard
                </button>
            </div>

            <!-- Footer -->
            <div
                style="
                    text-align: center;
                    padding: 16px 0;
                    color: var(--teks-sekunder);
                    font-size: 0.8rem;
                "
            >
                <p>
                    Langit Korea © 2025 — Dibuat dengan ❤️ untuk pekerja migran
                    Indonesia
                </p>
            </div>
        </div>

        <script type="module">
            import { supabase } from "./assets/js/supabase.js";
            import { checkAuthState } from "./assets/js/auth.js";
            import { navigateTo } from "./assets/js/utils.js";

            window.navigateTo = navigateTo;

            (async function init() {
                await checkAuthState();
                loadAllQuestions();
            })();

            let allQuestions = [];
            let filteredQuestions = [];

            // ========== LOAD ALL QUESTIONS ==========
            async function loadAllQuestions() {
                try {
                    let data = [];
                    try {
                        const { data: supabaseData, error: supabaseError } =
                            await supabase
                                .from("soal_eps")
                                .select("*")
                                .gte("unit", 31)
                                .lte("unit", 60)
                                .order("unit", { ascending: true })
                                .order("id", { ascending: true });

                        if (supabaseError) throw supabaseError;
                        data = supabaseData || [];
                        console.log(
                            "Data loaded from Supabase:",
                            data.length,
                            "questions",
                        );
                    } catch (e) {
                        console.warn(
                            "Supabase load failed, using dummy data:",
                            e,
                        );
                        data = dummyQuestions;
                    }

                    allQuestions = data;
                    console.log(`Total questions: ${allQuestions.length}`);

                    const unitsInDb = [
                        ...new Set(allQuestions.map((q) => q.unit)),
                    ];
                    console.log("Units available:", unitsInDb);

                    document.getElementById("loadingText").textContent =
                        `Memuat ${allQuestions.length} soal dari ${unitsInDb.length} unit...`;

                    populateUnitFilter();
                    applyFilter();
                    document.getElementById("loadingDiv").style.display =
                        "none";
                } catch (error) {
                    console.error("Error loading questions:", error);
                    document.getElementById("content").innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">⚠️</div>
                        <p>Gagal memuat soal. Pastikan koneksi internet aktif.</p>
                    </div>
                `;
                    document.getElementById("loadingDiv").style.display =
                        "none";
                }
            }

            // ========== POPULATE UNIT FILTER ==========
            function populateUnitFilter() {
                const unitFilter = document.getElementById("unitFilter");
                while (unitFilter.options.length > 1) unitFilter.remove(1);

                const unitsInDb = [...new Set(allQuestions.map((q) => q.unit))];

                for (let u = 31; u <= 60; u++) {
                    const option = document.createElement("option");
                    option.value = u;
                    option.textContent = `Unit ${u}`;
                    if (!unitsInDb.includes(u)) {
                        option.disabled = true;
                        option.textContent += " (belum tersedia)";
                        option.style.color = "#999";
                    }
                    unitFilter.appendChild(option);
                }
            }

            // ========== APPLY FILTER ==========
            function applyFilter() {
                const unit = document.getElementById("unitFilter").value;
                const type = document.getElementById("typeFilter").value;
                const level = document.getElementById("levelFilter").value;

                filteredQuestions = allQuestions.filter((q) => {
                    if (unit !== "all" && q.unit != unit) return false;
                    if (type !== "all" && q.tipe !== type) return false;
                    if (level !== "all" && q.tingkat !== level) return false;
                    return true;
                });

                // Update stats
                const membaca = filteredQuestions.filter(
                    (q) => q.tipe === "membaca",
                ).length;
                const listening = filteredQuestions.filter(
                    (q) => q.tipe === "mendengarkan",
                ).length;
                const valid = filteredQuestions.filter((q) => {
                    if (q.tipe === "mendengarkan") return !!q.audio_url;
                    return !q.audio_url;
                }).length;

                document.getElementById("statsSection").style.display = "grid";
                document.getElementById("statTotal").textContent =
                    filteredQuestions.length;
                document.getElementById("statMembaca").textContent = membaca;
                document.getElementById("statListening").textContent =
                    listening;
                document.getElementById("statValid").textContent =
                    filteredQuestions.length > 0
                        ? Math.round((valid / filteredQuestions.length) * 100) +
                          "%"
                        : "0%";

                // Update header
                const subtitle = document.getElementById("subtitle");
                if (unit === "all") {
                    subtitle.textContent = `${filteredQuestions.length} soal dari semua unit`;
                } else {
                    subtitle.textContent = `Unit ${unit} - ${filteredQuestions.length} soal`;
                }

                renderQuestions();
            }

            // ========== RENDER QUESTIONS ==========
            function renderQuestions() {
                const content = document.getElementById("content");

                if (filteredQuestions.length === 0) {
                    content.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">📭</div>
                        <p>Tidak ada soal yang sesuai filter.</p>
                        <p style="font-size: 14px; color: var(--teks-sekunder); margin-top: 8px;">Coba ubah filter atau pilih unit lain.</p>
                    </div>
                `;
                    return;
                }

                // Group by unit
                const grouped = {};
                filteredQuestions.forEach((q) => {
                    if (!grouped[q.unit]) grouped[q.unit] = [];
                    grouped[q.unit].push(q);
                });

                let html = "";

                Object.keys(grouped)
                    .sort((a, b) => a - b)
                    .forEach((unit) => {
                        const questions = grouped[unit];

                        html += `
                    <div class="card" style="margin-bottom: 16px;">
                        <div class="section-header">
                            <span class="section-icon">📝</span>
                            <span class="section-title">Unit ${unit}</span>
                            <span class="badge badge-free">${questions.length} Soal</span>
                        </div>
                `;

                        questions.forEach((q, idx) => {
                            const isListening = q.tipe === "mendengarkan";
                            const isValid =
                                (isListening && q.audio_url) ||
                                (!isListening && !q.audio_url);

                            html += `
                        <div class="card" style="margin-bottom: 8px; border-left: 4px solid ${isListening ? "var(--langit-fajar)" : "var(--langit-biru)"};">
                            <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                                <span style="font-weight: 600; font-size: 0.9rem;">Soal ${q.nomor || idx + 1}</span>
                                <span class="badge ${isListening ? "badge-premium" : "badge-free"}">${isListening ? "Mendengarkan" : "Membaca"}</span>
                            </div>
                            <p class="korean-text" style="margin-bottom: 12px;">${q.teks_soal || q.teks_soal_id || "(Teks tidak tersedia)"}</p>
                    `;

                            // Options
                            html += `<div class="options-grid">`;
                            const options = [
                                {
                                    key: "a",
                                    text: q.pilihan_a,
                                    correct: q.jawaban === "a",
                                },
                                {
                                    key: "b",
                                    text: q.pilihan_b,
                                    correct: q.jawaban === "b",
                                },
                                {
                                    key: "c",
                                    text: q.pilihan_c,
                                    correct: q.jawaban === "c",
                                },
                                {
                                    key: "d",
                                    text: q.pilihan_d,
                                    correct: q.jawaban === "d",
                                },
                            ];

                            options.forEach((opt) => {
                                if (!opt.text) return;
                                html += `
                            <div class="option-card" onclick="revealAnswer(this, '${opt.key}', '${q.jawaban}', '${q.id}')">
                                <span class="option-letter">${opt.key.toUpperCase()}</span>
                                <span class="korean-text">${opt.text}</span>
                            </div>
                        `;
                            });

                            html += `</div>`;

                            // Answer
                            html += `
                        <div id="answer_${q.id}" style="display:none; margin-top: 8px; padding: 10px; background: rgba(76, 175, 130, 0.08); border-radius: 8px; border-left: 3px solid var(--hijau-berhasil);">
                            <strong style="color: var(--hijau-berhasil);">✅ Jawaban Benar: ${q.jawaban ? q.jawaban.toUpperCase() : "(kosong)"}</strong>
                            ${q.penjelasan ? `<p style="font-size: 0.85rem; color: var(--teks-sekunder); margin-top: 6px;">${q.penjelasan}</p>` : ""}
                        </div>
                    `;

                            // Audio untuk listening
                            if (isListening && q.audio_url) {
                                html += `
                            <div class="audio-player">
                                <button class="audio-btn" onclick="this.nextElementSibling.play()">▶</button>
                                <audio src="${q.audio_url}" style="display:none;"></audio>
                                <span style="font-size: 0.85rem; color: var(--teks-sekunder);">🔊 Klik untuk dengarkan</span>
                            </div>
                        `;
                            } else if (isListening && !q.audio_url) {
                                html += `
                            <div style="font-size: 13px; color: var(--merah-salah); margin-top: 8px;">
                                ⚠️ Audio belum tersedia
                            </div>
                        `;
                            }

                            // Verification
                            html += `
                        <div style="margin-top: 8px; font-size: 0.8rem; color: ${isValid ? "var(--hijau-berhasil)" : "var(--merah-salah)"};">
                            ${isValid ? "✅ Valid" : "❌ Invalid - Periksa data soal"}
                        </div>
                    `;

                            html += `</div>`; // Close inner card
                        });

                        html += `</div>`; // Close unit card
                    });

                content.innerHTML = html;
            }

            // ========== REVEAL ANSWER ==========
            window.revealAnswer = function (
                element,
                selectedKey,
                correctAnswer,
                questionId,
            ) {
                const allCards =
                    element.parentElement.querySelectorAll(".option-card");
                const answerDiv = document.getElementById(
                    "answer_" + questionId,
                );

                allCards.forEach((c) => {
                    c.style.pointerEvents = "none";
                    const letter = c.querySelector(".option-letter");
                    const key = letter.textContent.toLowerCase();

                    if (key === correctAnswer) {
                        c.classList.add("correct");
                        letter.className = "option-letter option-correct";
                    } else if (key === selectedKey && key !== correctAnswer) {
                        c.classList.add("wrong");
                        letter.className = "option-letter option-wrong";
                    }
                });

                answerDiv.style.display = "block";
            };
        </script>
    </body>
</html>
