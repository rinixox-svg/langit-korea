<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Langit Korea — Simulasi Open Test</title>
  <link rel="stylesheet" href="assets/css/main.css" />
  <link rel="stylesheet" href="assets/css/modul-unit.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script type="module" src="assets/js/supabase.js"></script>
  <script type="module" src="assets/js/auth.js"></script>
  <script type="module" src="assets/js/utils.js"></script>
  <script type="module" src="assets/js/simulasi.js"></script>
  <style>
    .form-input { display:inline-block; padding:10px 14px; border:2px solid #e0e0e0; border-radius:8px; font-family:var(--font-utama); font-size:0.95rem; background:white; min-height:44px; }
    .sim-header { display:flex; justify-content:space-between; align-items:center; padding:12px 0; flex-wrap:wrap; gap:8px; }
    .timer-bar { position:sticky; top:0; z-index:100; background:var(--putih-bersih); padding:8px 16px; border-bottom:2px solid #e0e0e0; }
    .timer-display { font-size:1.5rem; font-weight:700; font-variant-numeric:tabular-nums; }
    .timer-display.warning { color:var(--merah-salah); }
    .timer-display.caution { color:var(--kuning-sedang); }
    .section-badge { display:inline-block; padding:3px 10px; border-radius:4px; font-size:0.75rem; font-weight:600; }
    .section-badge.membaca { background:rgba(74,144,217,0.12); color:var(--langit-biru); }
    .section-badge.mendengarkan { background:rgba(255,140,97,0.12); color:var(--langit-fajar); }
    .sim-nav { display:flex; gap:6px; flex-wrap:wrap; margin:12px 0; }
    .sim-nav-btn { width:36px; height:36px; border-radius:50%; border:2px solid #e0e0e0; background:white; cursor:pointer; font-weight:700; font-size:0.85rem; transition:all 0.15s; display:flex; align-items:center; justify-content:center; }
    .sim-nav-btn.answered { border-color:var(--langit-biru); background:rgba(74,144,217,0.1); }
    .sim-nav-btn.active { border-color:var(--langit-biru); background:var(--langit-biru); color:white; }
    .sim-nav-btn:disabled { opacity:0.4; cursor:not-allowed; }
    .question-card { display:none; background:white; border-radius:12px; padding:20px; margin-bottom:16px; }
    .question-card.active { display:block; }
    .q-text { font-family:var(--font-korea); font-size:1.05rem; line-height:1.7; margin-bottom:16px; }
    .q-image { max-width:100%; max-height:300px; margin:12px 0; border-radius:8px; }
    .mc-option { display:flex; align-items:center; gap:12px; padding:14px 16px; border-radius:10px; border:2px solid #e0e0e0; margin:6px 0; cursor:pointer; transition:all 0.15s; min-height:48px; }
    .mc-option:hover { border-color:var(--langit-biru); background:#f8faff; }
    .mc-option.selected { border-color:var(--langit-biru); background:rgba(74,144,217,0.08); }
    .mc-option.review-correct { border-color:var(--hijau-berhasil); background:rgba(76,175,130,0.08); }
    .mc-option.review-wrong { border-color:var(--merah-salah); background:rgba(224,92,92,0.08); }
    .mc-letter { display:flex; align-items:center; justify-content:center; width:30px; height:30px; border-radius:50%; background:#f0f0f0; font-weight:700; font-size:0.8rem; flex-shrink:0; }
    .mc-option.selected .mc-letter { background:var(--langit-biru); color:white; }
    .mc-option.review-correct .mc-letter { background:var(--hijau-berhasil); color:white; }
    .mc-option.review-wrong .mc-letter { background:var(--merah-salah); color:white; }
    .audio-btn { display:inline-flex; align-items:center; gap:8px; padding:10px 18px; border-radius:8px; border:1px solid #e0e0e0; background:white; cursor:pointer; font-size:0.9rem; margin-bottom:12px; min-height:44px; }
    .audio-btn:hover { border-color:var(--langit-biru); background:#f8faff; }
    .audio-btn.playing { border-color:var(--langit-biru); background:rgba(74,144,217,0.08); }
    .result-screen { text-align:center; padding:40px 20px; }
    .result-score { font-size:4rem; font-weight:800; margin:12px 0; }
    .result-detail { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin:24px 0; }
    .result-stat { background:white; border-radius:12px; padding:16px; box-shadow:0 1px 4px rgba(0,0,0,0.06); }
    .result-stat-value { font-size:1.8rem; font-weight:700; }
    .review-list { max-height:500px; overflow-y:auto; }
    @media (max-width:480px) { .sim-header { flex-direction:column; align-items:flex-start; } .result-detail { grid-template-columns:1fr; } }
  </style>
</head>
<body>
  <div id="jsStatus" style="padding:8px;background:#fff3cd;text-align:center;font-size:0.85rem">Memuat JavaScript...</div>
  <div class="container">
    <div class="sim-header">
      <h1 style="font-size:1.2rem;margin:0">📝 Simulasi Open Test</h1>
      <select id="yearSelect" class="form-input" style="min-width:100px">
        <option value="2023">Tahun 2023</option>
      </select>
    </div>

    <!-- Loading -->
    <div id="loadingDiv" class="module-loading"><div class="spinner"></div><p>Memuat soal...</p></div>
    <div id="errorDiv" class="module-empty" style="display:none"><p>Gagal memuat soal.</p><button class="btn btn-primary" onclick="location.reload()" style="margin-top:16px">Coba Lagi</button></div>

    <!-- Timer Bar -->
    <div class="timer-bar" id="timerBar" style="display:none">
      <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:4px">
        <div>
          <span class="section-badge membaca" id="sectionBadge">Membaca</span>
          <span style="font-size:0.85rem;color:var(--teks-sekunder);margin-left:8px" id="progressText">Soal 1/40</span>
        </div>
        <div class="timer-display" id="timerDisplay">50:00</div>
      </div>
      <div class="progress-track" style="margin-top:6px">
        <div class="progress-fill" id="simProgress" style="width:0%"></div>
      </div>
    </div>

    <!-- Navigation Dots -->
    <div class="sim-nav" id="simNav" style="display:none"></div>

    <!-- Questions Container -->
    <div id="questionArea"></div>

    <!-- Navigation Buttons -->
    <div id="navButtons" style="display:none;display:flex;justify-content:space-between;margin:16px 0;gap:12px">
      <button class="btn btn-outline" id="prevBtn" onclick="Simulasi.prev()">← Sebelumnya</button>
      <button class="btn btn-primary" id="nextBtn" onclick="Simulasi.next()">Berikutnya →</button>
      <button class="btn btn-secondary" id="submitBtn" onclick="Simulasi.submit()" style="display:none">✅ Selesai & Submit</button>
    </div>
  </div>

  <script>
    window.addEventListener('beforeunload', function(e) {
      const state = localStorage.getItem('langitkorea_simulasi_state');
      if (state) {
        const parsed = JSON.parse(state);
        if (!parsed.submitted) {
          e.preventDefault();
          e.returnValue = '';
        }
      }
    });
  </script>
</body>
</html>
