  // Direct Supabase REST API client (no CDN dependency)
  const SUPABASE_URL = "https://mozmuwrkfsipzfupybwh.supabase.co";
  const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1vem11d3JrZnNpcHpmdXB5YndoIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3NzY5NTk1NCwiZXhwIjoyMDkzMjcxOTU0fQ.SZSNk6xV-vq17beo_LwWzsZSp9UVGdqfR-R35cGxawE";
  async function apiFetch(table, opts) {
    let url = SUPABASE_URL + "/rest/v1/" + table + "?select=*";
    if (opts) {
      if (opts.filter) url += "&" + opts.filter;
      if (opts.order) url += "&order=" + opts.order;
    }
    const r = await fetch(url, {
      headers: { apikey: SUPABASE_KEY, Authorization: "Bearer " + SUPABASE_KEY }
    });
    if (!r.ok) throw new Error("HTTP " + r.status);
    return r.json();
  }
  async function apiGetUser() {
    try {
      const r = await fetch(SUPABASE_URL + "/rest/v1/rpc/get_user", {
        headers: { apikey: SUPABASE_KEY, Authorization: "Bearer " + SUPABASE_KEY }
      });
      return r.ok ? await r.json() : null;
    } catch(e) { return null; }
  }
  async function apiUpsert(table, data, conflict) {
    let url = SUPABASE_URL + "/rest/v1/" + table;
    const r = await fetch(url, {
      method: "POST",
      headers: { apikey: SUPABASE_KEY, Authorization: "Bearer " + SUPABASE_KEY, "Content-Type": "application/json", Prefer: "resolution=merge-duplicates" },
      body: JSON.stringify(data)
    });
    return r.ok;
  }

<body>
  <div id="app">
    <div class="container">
      <div class="sim-header">
        <h1 style="font-size:1.2rem;margin:0">📝 Simulasi Open Test</h1>
      </div>

      <div id="loadingDiv" class="loading"><div class="spinner"></div><p>Memuat soal...</p></div>
      <div id="errorDiv" class="empty" style="display:none"><p>Gagal memuat soal. Pastikan koneksi internet aktif.</p><button class="btn btn-primary" onclick="location.reload()" style="margin-top:16px">Coba Lagi</button></div>

      <div id="simArea" style="display:none">
        <div class="timer-bar">
          <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:4px">
            <div>
              <span class="badge badge-blue" id="sectionBadge">Membaca</span>
              <span style="font-size:0.85rem;color:#6b7a8d;margin-left:8px" id="progressText">Soal 1/40</span>
            </div>
            <div class="timer-display" id="timerDisplay">50:00</div>
          </div>
          <div class="progress-track"><div class="progress-fill" id="simProgress"></div></div>
        </div>

        <div class="nav-dots" id="navDots"></div>
        <div id="questionArea"></div>
        <div class="nav-btns" id="navBtns">
          <button class="btn btn-outline" id="prevBtn" onclick="window.simPrev()">← Sebelumnya</button>
          <button class="btn btn-primary" id="nextBtn" onclick="window.simNext()">Berikutnya →</button>
          <button class="btn btn-secondary" id="submitBtn" onclick="window.simSubmit()" style="display:none">✅ Selesai & Submit</button>
        </div>
      </div>
    </div>

  <script defer>
  // ===== SIMULASI ENGINE =====
  const SIM_KEY = 'lk_sim_state_open_test_2025_v1';
  const OPEN_TEST_DATA_VERSION = 'open-test-2025-official-pdf-v1';
  const CHOICE_KEYS = ['a', 'b', 'c', 'd'];

  function escapeHtml(value) {
    return String(value || '').replace(/[&<>"']/g, (ch) => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    }[ch]));
  }

  function escapeAttr(value) {
    return escapeHtml(value).replace(/`/g, '&#96;');
  }

  function textToHtml(value) {
    return escapeHtml(value).replace(/\n/g, '<br>');
  }

  function parseImageList(value) {
    if (!value) return [];
    if (Array.isArray(value)) return value.filter(Boolean);
    try {
      const parsed = JSON.parse(value);
      return Array.isArray(parsed) ? parsed.filter(Boolean) : [parsed].filter(Boolean);
    } catch(e) {
      return [value].filter(Boolean);
    }
  }

  function normalizeAssetUrl(value) {
    const raw = String(value || '').trim();
    if (!raw) return '';
    try {
      const url = new URL(raw, window.location.href);
      if (url.hostname === '127.0.0.1' || url.hostname === 'localhost') {
        return url.pathname.replace(/^\/+/, '') + url.search + url.hash;
      }
      if (url.origin === window.location.origin) {
        return url.pathname.replace(/^\/+/, '') + url.search + url.hash;
      }
    } catch(e) {}
    return raw;
  }

  function normalizeQuestion(q) {
    const out = Object.assign({}, q);
    out.jawaban = String(q.jawaban || q.jawaban_benar || '').toLowerCase();
    out.nomor_asli = Number(q.nomor_asli);
    out.audio_url = normalizeAssetUrl(out.audio_url);
    out.gambar_url = parseImageList(out.gambar_url).map(normalizeAssetUrl).filter(Boolean);
    CHOICE_KEYS.forEach((key) => {
      out['gambar_pilihan_' + key] = normalizeAssetUrl(out['gambar_pilihan_' + key]);
    });
    return out;
  }

  function hasRealChoiceText(value) {
    const text = String(value || '').trim();
    return !!text && !/^[①②③④\sa-dA-D.\-:]+$/.test(text);
  }

  function hasChoice(q, key) {
    return hasRealChoiceText(q['pilihan_' + key]) || !!String(q['gambar_pilihan_' + key] || '').trim();
  }

  function looksCompleteOpenTest(data) {
    if (!Array.isArray(data) || data.length !== 40) return false;
    const normalized = data.map(normalizeQuestion).sort((a, b) => a.nomor_asli - b.nomor_asli);
    for (let i = 0; i < normalized.length; i++) {
      const q = normalized[i];
      if (q.nomor_asli !== i + 1) return false;
      if (!['a', 'b', 'c', 'd'].includes(q.jawaban)) return false;
      if (!CHOICE_KEYS.every((key) => hasChoice(q, key))) return false;
      if (q.tipe === 'mendengarkan' && !q.audio_url) return false;
      if (!q.teks_soal && !q.gambar_url) return false;
    }
    return true;
  }

  async function loadLocalOpenTest(year) {
    if (String(year) !== '2025') throw new Error('Fallback lokal hanya tersedia untuk tahun 2025');
    const r = await fetch('open_test_2025.json', { cache: 'no-store' });
    if (!r.ok) throw new Error('open_test_2025.json tidak bisa dibaca');
    const data = (await r.json()).map(normalizeQuestion).sort((a, b) => a.nomor_asli - b.nomor_asli);
    if (!looksCompleteOpenTest(data)) throw new Error('open_test_2025.json belum lengkap');
    return data;
  }

  window.simApp = {
    questions: [], state: null, timer: null, audio: null, audioBtn: null, audioUrl: '',

    async init() {
      const year = new URLSearchParams(location.search).get('year') || '2025';
      try {
        let data = [];
        if (String(year) === '2025') {
          data = await loadLocalOpenTest(year);
        } else {
          data = (await apiFetch("soal_eps", {
            filter: "sumber=eq.open_test&tahun_soal=eq." + parseInt(year),
            order: "nomor_asli.asc"
          })).map(normalizeQuestion).sort((a, b) => a.nomor_asli - b.nomor_asli);
          if (!looksCompleteOpenTest(data)) throw new Error('Data Supabase open test belum lengkap');
        }
        this.questions = data;
        this.start(data);
      } catch(e) {
        console.error(e);
        document.getElementById('loadingDiv').style.display = 'none';
        const ed = document.getElementById('errorDiv');
        ed.style.display = 'block';
        ed.innerHTML = '<p>Gagal memuat: ' + e.message + '</p><button class="btn btn-primary" onclick="location.reload()">Coba Lagi</button>';
      }
    },

    start(data) {
      const saved = localStorage.getItem(SIM_KEY);
      if (saved) {
        try {
          const s = JSON.parse(saved);
          if (s.version === OPEN_TEST_DATA_VERSION && s.answers && s.answers.length === data.length && !s.submitted) {
            if (confirm('Lanjutkan sesi sebelumnya?')) { this.state = s; this.render(); this.tick(); return; }
          }
        } catch(e) {}
      }
      this.state = { version: OPEN_TEST_DATA_VERSION, answers: [], currentIdx: 0, submitted: false, remaining: 3000, startTime: Date.now() };
      localStorage.removeItem(SIM_KEY);
      this.render();
      this.tick();
    },

    tick() {
      if (this.timer) clearInterval(this.timer);
      this.timer = setInterval(() => {
        this.state.remaining--;
        const d = document.getElementById('timerDisplay');
        if (!d) return;
        const m = Math.floor(this.state.remaining / 60);
        const s = this.state.remaining % 60;
        d.textContent = String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
        d.className = 'timer-display' + (m < 5 ? ' warning' : m < 10 ? ' caution' : '');
        if (this.state.remaining <= 0) { clearInterval(this.timer); this.stopAudio(); alert('Waktu habis!'); this.submit(true); }
      }, 1000);
    },

    render() {
      document.getElementById('loadingDiv').style.display = 'none';
      document.getElementById('simArea').style.display = 'block';
      const q = this.questions[this.state.currentIdx];
      const i = this.state.currentIdx;
      const total = this.questions.length;
      const ans = this.state.answers;
      const sel = ans[i] || '';

      // Nav dots
      document.getElementById('navDots').innerHTML = this.questions.map((qq, j) =>
        '<button class="nav-dot' + (ans[j] ? ' answered' : '') + (j === i ? ' active' : '') + '" onclick="window.simGo(' + j + ')"' + (this.state.submitted?' disabled':'') + '>' + qq.nomor_asli + '</button>'
      ).join('');

      // Badge
      const badge = document.getElementById('sectionBadge');
      if (q.tipe === 'mendengarkan') { badge.textContent = '🔊 Mendengarkan'; badge.className = 'badge badge-orange'; }
      else { badge.textContent = '📖 Membaca'; badge.className = 'badge badge-blue'; }

      document.getElementById('progressText').textContent = 'Soal ' + (i+1) + '/' + total;
      const filled = ans.filter(a => a).length;
      document.getElementById('simProgress').style.width = (filled / total * 100) + '%';

      // Question card
      const opts = [
        { l:'A', key:'a', t:q.pilihan_a, img:q.gambar_pilihan_a },
        { l:'B', key:'b', t:q.pilihan_b, img:q.gambar_pilihan_b },
        { l:'C', key:'c', t:q.pilihan_c, img:q.gambar_pilihan_c },
        { l:'D', key:'d', t:q.pilihan_d, img:q.gambar_pilihan_d }
      ].filter(o => hasRealChoiceText(o.t) || o.img);

      let html = '<div class="question-card active">';
      html += '<div style="display:flex;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:6px">';
      html += '<span class="badge ' + (q.tipe === 'mendengarkan' ? 'badge-orange' : 'badge-blue') + '">' + (q.tipe === 'mendengarkan' ? '🔊' : '📖') + ' ' + (q.tipe === 'mendengarkan' ? 'Mendengarkan' : 'Membaca') + '</span>';
      html += '<span style="font-size:0.85rem;color:#6b7a8d">Soal ' + q.nomor_asli + '</span></div>';

      if (q.tipe === 'mendengarkan' && q.audio_url) {
        html += '<button class="audio-btn" onclick="window.simPlay(\'' + escapeAttr(q.audio_url) + '\',this)">🔊 Putar Audio</button>';
      }

      // Images
      parseImageList(q.gambar_url).forEach(u => {
        html += '<img src="' + escapeAttr(normalizeAssetUrl(u)) + '" class="q-image" onerror="this.style.display=\'none\'">';
      });

      html += '<p class="q-text">' + textToHtml(q.teks_soal || 'Soal tidak tersedia') + '</p>';
      html += '<div>';
      opts.forEach(o => {
        const isSel = sel === o.key;
        html += '<div class="opt' + (isSel ? ' selected' : '') + '" onclick="window.simAnswer(' + i + ',\'' + o.key + '\')"' + (this.state.submitted?' style="pointer-events:none"':'') + '>';
        html += '<span class="opt-letter">' + o.l + '</span><span class="opt-content">';
        if (o.img) html += '<img src="' + escapeAttr(normalizeAssetUrl(o.img)) + '" class="opt-image" alt="Pilihan ' + o.l + '" onerror="this.style.display=\'none\'">';
        if (hasRealChoiceText(o.t)) html += '<span class="opt-text">' + textToHtml(o.t) + '</span>';
        html += '</span></div>';
      });
      html += '</div></div>';
      document.getElementById('questionArea').innerHTML = html;

      // Nav buttons
      document.getElementById('prevBtn').style.display = i > 0 ? '' : 'none';
      document.getElementById('nextBtn').textContent = i < total - 1 ? 'Berikutnya →' : 'Selesai';
      document.getElementById('nextBtn').style.display = '';
      document.getElementById('submitBtn').style.display = i === total - 1 && !this.state.submitted ? '' : 'none';
    },

    answer(idx, val) { if (this.state.submitted) return; this.state.answers[idx] = val; localStorage.setItem(SIM_KEY, JSON.stringify(this.state)); this.render(); },
    go(idx) { if (this.state.submitted) return; this.stopAudio(); this.state.currentIdx = idx; this.render(); },
    prev() { if (this.state.currentIdx > 0) { this.stopAudio(); this.state.currentIdx--; this.render(); } },
    next() {
      this.stopAudio();
      if (this.state.currentIdx < this.questions.length - 1) { this.state.currentIdx++; this.render(); }
      else this.submit();
    },

    submit(skipConfirm = false) {
      if (this.state.submitted) return;
      if (!skipConfirm && !confirm('Submit simulasi? Jawaban tidak bisa diubah lagi.')) return;
      this.stopAudio();
      clearInterval(this.timer);
      this.state.submitted = true;
      localStorage.setItem(SIM_KEY, JSON.stringify(this.state));
      this.showResult();
      this.saveProgress();
    },

    showResult() {
      this.stopAudio();
      const ans = this.state.answers;
      let correct = 0, rCor = 0, lCor = 0;
      const review = this.questions.map((q, i) => {
        const ua = ans[i] || '-';
        const ok = ua === q.jawaban;
        if (ok) { correct++; if (q.tipe === 'membaca') rCor++; else lCor++; }
        return { q, ua, ok };
      });
      const total = this.questions.length;
      const pct = Math.round(correct / total * 100);
      const lap = this.state.startTime ? Math.round((Date.now() - this.state.startTime) / 60000) : 50;
      const durasiDetik = this.state.startTime ? Math.round((Date.now() - this.state.startTime) / 1000) : 3000;
      const readingTotal = this.questions.filter(q=>q.tipe==='membaca').length;
      const listeningTotal = this.questions.filter(q=>q.tipe==='mendengarkan').length;
      const wrongReading = review.filter(r => !r.ok && r.q.tipe === 'membaca').map(r => r.q.nomor_asli);
      const wrongListening = review.filter(r => !r.ok && r.q.tipe === 'mendengarkan').map(r => r.q.nomor_asli);
      const unanswered = review.filter(r => r.ua === '-').map(r => r.q.nomor_asli);
      const weakArea = lCor / Math.max(1, listeningTotal) < rCor / Math.max(1, readingTotal) ? 'mendengarkan' : 'membaca';

      localStorage.setItem('simulationResult', JSON.stringify({
        skor_total: pct,
        total_soal: total,
        skor_membaca: rCor,
        total_membaca: readingTotal,
        skor_mendengar: lCor,
        total_mendengar: listeningTotal,
        durasi_detik: durasiDetik,
        selesai_at: new Date().toISOString(),
        analysis_payload: {
          weak_area: weakArea,
          wrong_reading: wrongReading,
          wrong_listening: wrongListening,
          unanswered: unanswered,
          answers: ans,
        }
      }));

      document.getElementById('navBtns').innerHTML = '';
      let html = '<div class="result"><div style="font-size:4rem;margin-bottom:8px">' + (pct >= 60 ? '🎉' : '💪') + '</div>';
      html += '<h2>' + (pct >= 60 ? 'LULUS!' : 'Terus Semangat!') + '</h2>';
      html += '<div class="result-score" style="color:' + (pct >= 60 ? '#4caf82' : '#e05c5c') + '">' + pct + '%</div>';
      html += '<p style="color:#6b7a8d">' + correct + '/' + total + ' benar | Waktu: ' + lap + ' menit</p>';
      html += '<div class="result-grid"><div class="result-stat"><div class="result-stat-value" style="color:#4a90d9">' + rCor + '/' + readingTotal + '</div><div>Membaca</div></div>';
      html += '<div class="result-stat"><div class="result-stat-value" style="color:#ff8c61">' + lCor + '/' + listeningTotal + '</div><div>Mendengarkan</div></div></div>';
      html += '<div class="result-stat" style="text-align:left;margin:0 0 16px">';
      html += '<strong>Analisa singkat</strong>';
      html += '<p style="margin-top:6px;color:#6b7a8d;font-size:0.9rem">Area prioritas: <strong>' + weakArea + '</strong>. Kosong: ' + unanswered.length + '. Salah membaca: ' + wrongReading.length + '. Salah mendengarkan: ' + wrongListening.length + '.</p>';
      if (wrongReading.length || wrongListening.length) {
        html += '<p style="margin-top:6px;color:#6b7a8d;font-size:0.85rem">Nomor yang perlu direview: ' + wrongReading.concat(wrongListening).slice(0, 20).join(', ') + '</p>';
      }
      html += '</div>';
      html += '<button class="btn btn-outline" onclick="document.getElementById(\'rv\').style.display=\'block\'">📋 Review</button> ';
      html += '<button class="btn btn-primary" onclick="localStorage.removeItem(\'' + SIM_KEY + '\');location.reload()">🔄 Ulangi</button>';
      html += '</div>';
      html += '<div id="rv" style="display:none;margin-top:24px"><h3 style="margin-bottom:12px">📋 Review</h3>';
      review.forEach(r => {
        html += '<div class="review-item" style="border-left-color:' + (r.ok ? '#4caf82' : '#e05c5c') + '">';
        html += '<div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:4px"><strong>Soal ' + r.q.nomor_asli + '</strong>';
        html += '<span class="badge ' + (r.q.tipe === 'mendengarkan' ? 'badge-orange' : 'badge-blue') + '">' + r.q.tipe + '</span></div>';
        html += '<p style="font-size:0.85rem;margin:6px 0">' + (r.q.teks_soal||'').slice(0,120) + '</p>';
        html += '<div style="font-size:0.85rem">Jawabanmu: <strong style="color:' + (r.ok ? '#4caf82' : '#e05c5c') + '">' + r.ua.toUpperCase() + '</strong>';
        if (!r.ok) html += ' | Benar: <strong style="color:#4caf82">' + (r.q.jawaban||'-').toUpperCase() + '</strong>';
        html += '</div></div>';
      });
      html += '</div>';
      document.getElementById('questionArea').innerHTML = html;
    },

    async saveProgress() {
      try {
        let correct = 0;
        this.questions.forEach((q, i) => { if (this.state.answers[i] === q.jawaban) correct++; });
        await apiUpsert("progress_unit", [{
          unit_id: 0, seksi: 'simulasi',
          skor: correct, completed: true, completed_at: new Date().toISOString(),
        }]);
      } catch(e) { console.warn(e); }
    },

    stopAudio() {
      if (this.audio) {
        this.audio.pause();
        this.audio.currentTime = 0;
      }
      if (this.audioBtn) {
        this.audioBtn.classList.remove('playing');
        this.audioBtn.textContent = '🔊 Putar Audio';
      }
      this.audioBtn = null;
      this.audioUrl = '';
    },

    playAudio(url, btn) {
      url = normalizeAssetUrl(url);
      if (!url) return;
      const sameAudioPlaying = this.audio && this.audioUrl === url && !this.audio.paused;
      this.stopAudio();
      if (sameAudioPlaying) return;

      if (!this.audio) {
        this.audio = document.createElement('audio');
        this.audio.preload = 'auto';
        this.audio.setAttribute('playsinline', '');
        document.body.appendChild(this.audio);
      }
      this.audio.src = url;
      this.audioUrl = url;
      this.audioBtn = btn || null;
      if (btn) {
        btn.classList.add('playing');
        btn.textContent = '⏸ Hentikan Audio';
      }
      this.audio.onended = () => this.stopAudio();
      this.audio.onerror = () => {
        this.stopAudio();
        this.showAudioError('Audio tidak bisa dimuat. Coba buka lewat alamat IP komputer, bukan 127.0.0.1 di HP.');
      };
      this.audio.play().catch((error) => {
        console.warn('Audio play failed:', error);
        this.stopAudio();
        this.showAudioError('Audio belum bisa diputar. Di HP, pastikan halaman dibuka dari alamat IP komputer dan mode senyap/media volume tidak aktif.');
      });
    },

    showAudioError(message) {
      const card = document.querySelector('.question-card.active');
      if (!card) return;
      const old = card.querySelector('.audio-error');
      if (old) old.remove();
      const el = document.createElement('p');
      el.className = 'audio-error';
      el.textContent = message;
      const audioButton = card.querySelector('.audio-btn');
      if (audioButton) audioButton.insertAdjacentElement('afterend', el);
    }
  };

  window.simAnswer = (i, v) => window.simApp.answer(i, v);
  window.simGo = (i) => window.simApp.go(i);
  window.simPrev = () => window.simApp.prev();
  window.simNext = () => window.simApp.next();
  window.simSubmit = () => window.simApp.submit();
  window.simPlay = (u, b) => window.simApp.playAudio(u, b);

  // Prevent accidental reload
  window.addEventListener('beforeunload', (e) => {
    window.simApp.stopAudio();
    const s = window.simApp.state;
    if (s && !s.submitted && s.answers && s.answers.some(a => a)) { e.preventDefault(); e.returnValue = ''; }
  });

  document.addEventListener('visibilitychange', () => {
    if (document.hidden) window.simApp.stopAudio();
  });

  document.addEventListener('DOMContentLoaded', () => window.simApp.init());
  </script>
</body>
</html>
