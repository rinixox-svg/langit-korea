<!doctype html>
<html lang="id">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Practice EPS-TOPIK - Langit Korea</title>
        <link
            href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;700&display=swap"
            rel="stylesheet"
        />
        <style>
            :root {
                --langit-biru: #4a90d9;
                --langit-fajar: #ff8c61;
                --langit-malam: #1a2340;
                --putih-bersih: #f8f9ff;
                --teks-utama: #1e2a3a;
                --teks-sekunder: #6b7a8d;
                --hijau-berhasil: #4caf82;
                --merah-salah: #e05c5c;
                --kuning-sedang: #f5a623;
            }
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            body {
                font-family: "Plus Jakarta Sans", sans-serif;
                background: var(--putih-bersih);
                color: var(--teks-utama);
                line-height: 1.6;
                min-height: 100vh;
                padding: 16px;
            }
            .korean-text {
                font-family: "Noto Sans KR", sans-serif;
            }
            .container {
                max-width: 800px;
                margin: 0 auto;
            }
            header {
                text-align: center;
                padding: 24px 16px;
                background: linear-gradient(
                    135deg,
                    var(--langit-biru),
                    var(--langit-fajar)
                );
                border-radius: 20px;
                color: white;
                margin-bottom: 20px;
            }
            header h1 {
                font-size: 1.4rem;
                font-weight: 700;
                margin-bottom: 8px;
            }
            header p {
                font-size: 0.9rem;
                opacity: 0.95;
            }
            .info-bar {
                display: flex;
                justify-content: space-between;
                align-items: center;
                background: white;
                padding: 12px 20px;
                border-radius: 12px;
                margin-bottom: 16px;
                box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
                flex-wrap: wrap;
                gap: 10px;
            }
            .info-item {
                display: flex;
                align-items: center;
                gap: 8px;
                font-size: 0.85rem;
                font-weight: 600;
            }
            .info-item .icon {
                font-size: 1.2rem;
            }
            .info-item .value {
                background: var(--langit-biru);
                color: white;
                padding: 4px 10px;
                border-radius: 20px;
                font-size: 0.9rem;
            }
            .info-item .value.warning {
                background: var(--kuning-sedang);
            }
            .info-item .value.danger {
                background: var(--merah-salah);
            }
            .grid-nav {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(40px, 1fr));
                gap: 8px;
                margin-bottom: 16px;
                max-height: 200px;
                overflow-y: auto;
                padding: 12px;
                background: white;
                border-radius: 12px;
                box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
            }
            .grid-btn {
                width: 40px;
                height: 40px;
                border: 2px solid #e0e0e0;
                background: white;
                border-radius: 8px;
                cursor: pointer;
                font-weight: 700;
                font-size: 0.9rem;
                color: var(--teks-utama);
                transition: all 0.2s;
                display: flex;
                align-items: center;
                justify-content: center;
            }
            .grid-btn:hover {
                border-color: var(--langit-biru);
                transform: scale(1.05);
            }
            .grid-btn.answered {
                background: var(--hijau-berhasil);
                color: white;
                border-color: var(--hijau-berhasil);
            }
            .grid-btn.current {
                border-color: var(--langit-fajar);
                background: var(--langit-fajar);
                color: white;
                box-shadow: 0 0 0 3px rgba(255, 140, 97, 0.3);
            }
            .grid-btn.unanswered {
                border-color: #e0e0e0;
            }
            .soal-container {
                background: white;
                border-radius: 16px;
                padding: 20px;
                margin-bottom: 16px;
                box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
            }
            .soal-header {
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-bottom: 16px;
                padding-bottom: 12px;
                border-bottom: 2px solid #f0f0f0;
            }
            .soal-nomor {
                font-size: 0.85rem;
                font-weight: 700;
                color: var(--teks-sekunder);
            }
            .soal-tipe {
                padding: 4px 12px;
                border-radius: 20px;
                font-size: 0.75rem;
                font-weight: 700;
            }
            .soal-tipe.reading {
                background: #e3f2fd;
                color: #1976d2;
            }
            .soal-tipe.listening {
                background: #fff3e0;
                color: #f57c00;
            }
            .soal-teks {
                font-size: 1rem;
                line-height: 1.7;
                margin-bottom: 16px;
            }
            .soal-gambar {
                max-width: 100%;
                height: auto;
                border-radius: 8px;
                margin: 12px 0;
            }
            .pilihan-container {
                display: flex;
                flex-direction: column;
                gap: 10px;
            }
            .pilihan-item {
                padding: 14px 16px;
                border: 2px solid #e0e0e0;
                border-radius: 12px;
                cursor: pointer;
                transition: all 0.2s;
                display: flex;
                align-items: flex-start;
                gap: 12px;
            }
            .pilihan-item:hover {
                border-color: var(--langit-biru);
                background: #f0f7ff;
            }
            .pilihan-item.selected {
                border-color: var(--langit-biru);
                background: #e3f2fd;
            }
            .pilihan-item.correct {
                border-color: var(--hijau-berhasil);
                background: #e8f5e9;
            }
            .pilihan-item.wrong {
                border-color: var(--merah-salah);
                background: #ffebee;
            }
            .pilihan-huruf {
                width: 28px;
                height: 28px;
                border-radius: 50%;
                background: #e0e0e0;
                display: flex;
                align-items: center;
                justify-content: center;
                font-weight: 700;
                font-size: 0.8rem;
                flex-shrink: 0;
            }
            .pilihan-item.selected .pilihan-huruf {
                background: var(--langit-biru);
                color: white;
            }
            .pilihan-item.correct .pilihan-huruf {
                background: var(--hijau-berhasil);
                color: white;
            }
            .pilihan-item.wrong .pilihan-huruf {
                background: var(--merah-salah);
                color: white;
            }
            .pilihan-teks {
                font-size: 0.95rem;
                line-height: 1.5;
            }
            .audio-section {
                background: #f5f5f5;
                border-radius: 12px;
                padding: 16px;
                margin: 16px 0;
            }
            .audio-controls {
                display: flex;
                align-items: center;
                gap: 12px;
                margin-bottom: 12px;
            }
            .btn-audio {
                width: 48px;
                height: 48px;
                border-radius: 50%;
                border: none;
                background: var(--langit-biru);
                color: white;
                cursor: pointer;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 1.2rem;
                transition: all 0.2s;
            }
            .btn-audio:hover {
                background: var(--langit-fajar);
                transform: scale(1.05);
            }
            .btn-audio:disabled {
                background: #b0b0b0;
                cursor: not-allowed;
            }
            .audio-progress {
                flex: 1;
                height: 6px;
                background: #e0e0e0;
                border-radius: 3px;
                overflow: hidden;
            }
            .audio-progress-bar {
                height: 100%;
                background: var(--langit-biru);
                width: 0%;
                transition: width 0.1s;
            }
            .audio-time {
                font-size: 0.8rem;
                color: var(--teks-sekunder);
                min-width: 80px;
                text-align: center;
            }
            .audio-text {
                font-family: "Noto Sans KR", sans-serif;
                font-size: 0.9rem;
                padding: 10px;
                background: white;
                border-radius: 8px;
                border-left: 3px solid var(--langit-biru);
                display: none;
            }
            .audio-text.show {
                display: block;
            }
            .btn-toggle-text {
                background: none;
                border: none;
                color: var(--langit-biru);
                font-size: 0.8rem;
                cursor: pointer;
                padding: 4px 8px;
            }
            .action-bar {
                display: flex;
                justify-content: space-between;
                gap: 12px;
                margin-top: 16px;
            }
            .btn-action {
                flex: 1;
                padding: 14px;
                border: none;
                border-radius: 12px;
                font-family: "Plus Jakarta Sans", sans-serif;
                font-size: 0.95rem;
                font-weight: 600;
                cursor: pointer;
                transition: all 0.2s;
            }
            .btn-prev {
                background: #e0e0e0;
                color: var(--teks-utama);
            }
            .btn-prev:hover {
                background: #d0d0d0;
            }
            .btn-next {
                background: var(--langit-biru);
                color: white;
            }
            .btn-next:hover {
                background: var(--langit-fajar);
            }
            .btn-selesai {
                background: var(--hijau-berhasil);
                color: white;
            }
            .btn-selesai:hover {
                background: #388e3c;
            }
            .loading {
                display: none;
                text-align: center;
                padding: 40px;
            }
            .loading.show {
                display: block;
            }
            .spinner {
                width: 40px;
                height: 40px;
                border: 4px solid #e0e0e0;
                border-top-color: var(--langit-biru);
                border-radius: 50%;
                animation: spin 1s linear infinite;
                margin: 0 auto 16px;
            }
            @keyframes spin {
                to {
                    transform: rotate(360deg);
                }
            }
            .pesan {
                display: none;
                padding: 12px 16px;
                border-radius: 8px;
                margin-bottom: 16px;
                font-size: 0.9rem;
            }
            .pesan.sukses {
                background: #e8f5e9;
                color: #2e7d32;
                display: block;
            }
            .pesan.error {
                background: #ffebee;
                color: #c62828;
                display: block;
            }
            .pesan.info {
                background: #e3f2fd;
                color: #1976d2;
                display: block;
            }
            .empty-state {
                text-align: center;
                padding: 40px 20px;
                color: var(--teks-sekunder);
            }
            .empty-state h3 {
                margin-bottom: 8px;
            }
            footer {
                text-align: center;
                padding: 20px;
                color: var(--teks-sekunder);
                font-size: 0.85rem;
            }
            @media (min-width: 768px) {
                body {
                    padding: 24px;
                }
                header h1 {
                    font-size: 1.6rem;
                }
                .info-bar {
                    flex-wrap: nowrap;
                }
            }
        </style>
    </head>
    <body>
        <div class="container">
            <header>
                <h1>📝 Practice EPS-TOPIK</h1>
                <p>Latihan setengah - 10 Reading + 10 Listening</p>
            </header>

            <div id="loading" class="loading">
                <div class="spinner"></div>
                <p>Memuat soal...</p>
            </div>

            <div id="pesan"></div>

            <div id="main-content" style="display: none">
                <div class="info-bar">
                    <div class="info-item">
                        <span class="icon">📄</span>
                        <span
                            >Soal <span id="soal-aktif-nomor">1</span> dari
                            20</span
                        >
                    </div>
                    <div class="info-item">
                        <span class="icon">✅</span>
                        <span
                            >Terjawab
                            <span id="jawaban-terjawab">0</span>/20</span
                        >
                    </div>
                    <div class="info-item">
                        <span class="icon">📊</span>
                        <span
                            >Reading <span id="reading-count">0</span> |
                            Listening <span id="listening-count">0</span></span
                        >
                    </div>
                </div>

                <div class="soal-container">
                    <div class="soal-header">
                        <span class="soal-nomor" id="soal-nomor-display"
                            >Soal 1</span
                        >
                        <span class="soal-tipe" id="soal-tipe-display"
                            >Reading</span
                        >
                    </div>
                    <div class="soal-teks korean-text" id="soal-teks"></div>
                    <div id="soal-gambar-container"></div>

                    <div
                        id="audio-section"
                        class="audio-section"
                        style="display: none"
                    >
                        <div class="audio-controls">
                            <button
                                class="btn-audio"
                                id="btn-play"
                                onclick="toggleAudio()"
                            >
                                ▶
                            </button>
                            <div class="audio-progress">
                                <div
                                    class="audio-progress-bar"
                                    id="audio-progress"
                                ></div>
                            </div>
                            <span class="audio-time" id="audio-time"
                                >00:00</span
                            >
                        </div>
                        <div class="audio-text" id="audio-text"></div>
                        <button
                            class="btn-toggle-text"
                            id="btn-toggle-text"
                            onclick="toggleAudioText()"
                        >
                            Teks Audio
                        </button>
                    </div>

                    <div class="pilihan-container" id="pilihan-container"></div>
                </div>

                <div class="grid-nav" id="grid-nav"></div>

                <div class="action-bar">
                    <button
                        class="btn-action btn-prev"
                        id="btn-prev"
                        onclick="prevSoal()"
                    >
                        ← Sebelumnya
                    </button>
                    <button
                        class="btn-action btn-selesai"
                        id="btn-selesai"
                        onclick="selesaikanPractice()"
                    >
                        Selesai Practice
                    </button>
                    <button
                        class="btn-action btn-next"
                        id="btn-next"
                        onclick="nextSoal()"
                    >
                        Selanjutnya →
                    </button>
                </div>
            </div>

            <footer>
                <p>Langit Korea - Teman Belajar Menuju Masa Depan Lebih Baik</p>
            </footer>
        </div>

        <script src="js/supabase-config.js"></script>
        <script>
            // State
            const state = {
                soal: [],
                jawaban: {},
                soalAktif: 0,
                timerDetik: 0,
                timerInterval: null,
                audioSedangBerjalan: false,
                audioPlayCount: 0,
                modeSoal: "practice",
            };

            // Gunakan db dari config
            const db = window.db;

            // Inisialisasi
            document.addEventListener("DOMContentLoaded", init);

            async function init() {
                tampilkanLoading(true);
                try {
                    await ambilSoalPractice();
                    renderGrid();
                    renderSoal();
                    tampilkanLoading(false);
                    document.getElementById("main-content").style.display =
                        "block";
                } catch (error) {
                    tampilkanPesan(
                        "Gagal memuat soal: " + error.message,
                        "error",
                    );
                    tampilkanLoading(false);
                }
            }

            async function ambilSoalPractice() {
                // Ambil 10 soal reading
                const { data: reading, error: err1 } = await db
                    .from("soal_eps")
                    .select("*")
                    .eq("tipe", "membaca")
                    .eq("akses", "free")
                    .order("id")
                    .limit(10);

                if (err1) throw err1;

                // Ambil 10 soal listening
                const { data: listening, error: err2 } = await db
                    .from("soal_eps")
                    .select("*")
                    .eq("tipe", "mendengarkan")
                    .eq("akses", "free")
                    .order("id")
                    .limit(10);

                if (err2) throw err2;

                // Gabung dan shuffle
                const gabung = [
                    ...reading.map((s) => ({
                        ...s,
                        nomor_tampil: Math.random(),
                    })),
                    ...listening.map((s) => ({
                        ...s,
                        nomor_tampil: Math.random(),
                    })),
                ];
                gabung.sort((a, b) => a.nomor_tampil - b.nomor_tampil);

                state.soal = gabung.map((s, i) => ({
                    ...s,
                    nomor_urut: i + 1,
                }));
            }

            function renderGrid() {
                const grid = document.getElementById("grid-nav");
                grid.innerHTML = "";
                state.soal.forEach((s, i) => {
                    const btn = document.createElement("button");
                    btn.className =
                        "grid-btn " +
                        (state.jawaban[s.id] ? "answered" : "unanswered");
                    if (i === state.soalAktif) btn.classList.add("current");
                    btn.textContent = i + 1;
                    btn.onclick = () => gotoSoal(i);
                    grid.appendChild(btn);
                });
                updateInfoBar();
            }

            function renderSoal() {
                const soal = state.soal[state.soalAktif];
                if (!soal) return;

                document.getElementById("soal-aktif-nomor").textContent =
                    state.soalAktif + 1;
                document.getElementById("soal-nomor-display").textContent =
                    `Soal ${state.soalAktif + 1}`;

                const tipeEl = document.getElementById("soal-tipe-display");
                const isListening = soal.tipe === "mendengarkan";
                tipeEl.textContent = isListening ? "Listening" : "Reading";
                tipeEl.className =
                    "soal-tipe " + (isListening ? "listening" : "reading");

                document.getElementById("soal-teks").innerHTML =
                    soal.teks_soal || "-";

                // Gambar soal
                const gambarContainer = document.getElementById(
                    "soal-gambar-container",
                );
                if (soal.gambar_url) {
                    gambarContainer.innerHTML = `<img src="${soal.gambar_url}" class="soal-gambar" alt="Gambar soal">`;
                } else {
                    gambarContainer.innerHTML = "";
                }

                // Audio section
                const audioSection = document.getElementById("audio-section");
                if (isListening && soal.audio_url) {
                    audioSection.style.display = "block";
                    resetAudio();
                    const audioText = document.getElementById("audio-text");
                    audioText.textContent = soal.audio_teks || "-";
                } else {
                    audioSection.style.display = "none";
                }

                // Pilihan
                const container = document.getElementById("pilihan-container");
                container.innerHTML = "";
                const pilihan = ["a", "b", "c", "d"];
                const huruf = ["A", "B", "C", "D"];

                pilihan.forEach((p, i) => {
                    const teks = soal[`pilihan_${p}`];
                    if (!teks) return;

                    const item = document.createElement("div");
                    item.className = "pilihan-item";
                    if (state.jawaban[soal.id] === p)
                        item.classList.add("selected");

                    item.innerHTML = `
                    <span class="pilihan-huruf">${huruf[i]}</span>
                    <span class="pilihan-teks korean-text">${teks}</span>
                `;

                    item.onclick = () => pilihJawaban(soal.id, p, item);
                    container.appendChild(item);
                });

                renderGrid();
                updateNavButtons();
            }

            function pilihJawaban(soalId, pilihan, el) {
                state.jawaban[soalId] = pilihan;
                document.querySelectorAll(".pilihan-item").forEach((item) => {
                    item.classList.remove("selected");
                });
                el.classList.add("selected");
                renderGrid();
            }

            function updateInfoBar() {
                const answered = Object.keys(state.jawaban).length;
                document.getElementById("jawaban-terjawab").textContent =
                    answered;

                const readingCount = state.soal.filter(
                    (s) => s.tipe === "membaca" && state.jawaban[s.id],
                ).length;
                const listeningCount = state.soal.filter(
                    (s) => s.tipe === "mendengarkan" && state.jawaban[s.id],
                ).length;
                document.getElementById("reading-count").textContent =
                    readingCount;
                document.getElementById("listening-count").textContent =
                    listeningCount;
            }

            function updateNavButtons() {
                document.getElementById("btn-prev").disabled =
                    state.soalAktif === 0;
                document.getElementById("btn-next").disabled =
                    state.soalAktif === state.soal.length - 1;

                const btnSelesai = document.getElementById("btn-selesai");
                btnSelesai.style.display =
                    state.soalAktif === state.soal.length - 1
                        ? "block"
                        : "none";
            }

            function gotoSoal(index) {
                state.soalAktif = index;
                renderSoal();
            }

            function prevSoal() {
                if (state.soalAktif > 0) {
                    state.soalAktif--;
                    renderSoal();
                }
            }

            function nextSoal() {
                if (state.soalAktif < state.soal.length - 1) {
                    state.soalAktif++;
                    renderSoal();
                }
            }

            // Audio controls
            let audioElement = null;
            let audioDuration = 0;

            function resetAudio() {
                if (audioElement) {
                    audioElement.pause();
                    audioElement = null;
                }
                state.audioSedangBerjalan = false;
                state.audioPlayCount = 0;
                document.getElementById("btn-play").textContent = "▶";
                document.getElementById("audio-progress").style.width = "0%";
                document.getElementById("audio-time").textContent = "00:00";
            }

            function toggleAudio() {
                const soal = state.soal[state.soalAktif];
                if (!soal || !soal.audio_url) return;

                if (!audioElement) {
                    audioElement = new Audio(soal.audio_url);
                    audioElement.onloadedmetadata = () => {
                        audioDuration = audioElement.duration;
                    };
                    audioElement.onended = () => {
                        state.audioSedangBerjalan = false;
                        document.getElementById("btn-play").textContent = "▶";
                        document.getElementById("audio-progress").style.width =
                            "100%";
                        state.audioPlayCount++;
                    };
                    audioElement.ontimeupdate = () => {
                        const pct =
                            (audioElement.currentTime / audioDuration) * 100;
                        document.getElementById("audio-progress").style.width =
                            pct + "%";
                        document.getElementById("audio-time").textContent =
                            formatTime(audioElement.currentTime) +
                            " / " +
                            formatTime(audioDuration);
                    };
                }

                if (state.audioSedangBerjalan) {
                    audioElement.pause();
                    state.audioSedangBerjalan = false;
                    document.getElementById("btn-play").textContent = "▶";
                } else {
                    audioElement.play().catch((e) => {
                        tampilkanPesan("Gagal memutar audio", "error");
                    });
                    state.audioSedangBerjalan = true;
                    document.getElementById("btn-play").textContent = "⏸";
                }
            }

            function formatTime(seconds) {
                const m = Math.floor(seconds / 60);
                const s = Math.floor(seconds % 60);
                return (
                    m.toString().padStart(2, "0") +
                    ":" +
                    s.toString().padStart(2, "0")
                );
            }

            function toggleAudioText() {
                const el = document.getElementById("audio-text");
                el.classList.toggle("show");
            }

            async function selesaikanPractice() {
                const belumDijawab =
                    state.soal.length - Object.keys(state.jawaban).length;
                if (belumDijawab > 0) {
                    if (
                        !confirm(
                            `Masih ada ${belumDijawab} soal yang belum dijawab. Yakin ingin selesai?`,
                        )
                    ) {
                        return;
                    }
                }

                // Hitung skor
                let benar = 0;
                let salah = 0;
                const detailJawaban = [];

                for (const soal of state.soal) {
                    const jawabanUser = state.jawaban[soal.id];
                    const benarSoal = jawabanUser === soal.jawaban_benar;
                    if (benarSoal) benar++;
                    else salah++;

                    detailJawaban.push({
                        nomor: soal.nomor_urut,
                        tipe: soal.tipe,
                        jawabanUser: jawabanUser || "-",
                        jawabanBenar: soal.jawaban_benar,
                        benar: benarSoal,
                    });

                    // Simpan ke progress
                    try {
                        await db.from("progress_user").insert({
                            user_id: "temp-user",
                            soal_id: soal.id,
                            tipe_soal: "eps",
                            jawaban_user: jawabanUser || null,
                            benar: benarSoal,
                            dikerjakan_at: new Date().toISOString(),
                        });
                    } catch (e) {
                        console.log(
                            "Progress tidak tersimpan (offline/demo mode)",
                        );
                    }
                }

                const total = state.soal.length;
                const skorPersen = Math.round((benar / total) * 100);
                const lulus = skorPersen >= 70;

                // Redirect ke hasil
                const params = new URLSearchParams({
                    skor_reading: state.soal.filter(
                        (s) =>
                            s.tipe === "membaca" &&
                            state.jawaban[s.id] === s.jawaban_benar,
                    ).length,
                    skor_listening: state.soal.filter(
                        (s) =>
                            s.tipe === "mendengarkan" &&
                            state.jawaban[s.id] === s.jawaban_benar,
                    ).length,
                    skor_total: benar,
                    total_soal: total,
                    lulus: lulus,
                    mode: "practice",
                });

                window.location.href =
                    "hasil-simulasi.html?" + params.toString();
            }

            function tampilkanLoading(tampil) {
                document
                    .getElementById("loading")
                    .classList.toggle("show", tampil);
            }

            function tampilkanPesan(pesan, tipe = "info") {
                const el = document.getElementById("pesan");
                el.textContent = pesan;
                el.className = "pesan " + tipe;
            }
        </script>
    </body>
</html>
