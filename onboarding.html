<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Langit Korea - Daftar Akun</title>

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>

    <style>
        :root {
            --langit-biru: #4A90D9;
            --langit-fajar: #FF8C61;
            --putih-bersih: #F8F9FF;
            --teks-utama: #1E2A3A;
            --teks-sekunder: #6B7A8D;
            --hijau-berhasil: #4CAF82;
            --merah-salah: #E05C5C;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--putih-bersih);
            color: var(--teks-utama);
            padding: 20px;
            max-width: 480px;
            margin: 0 auto;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .header { text-align: center; margin-bottom: 30px; }
        .logo { font-size: 28px; font-weight: 700; color: var(--langit-biru); }
        .subtitle { font-size: 14px; color: var(--teks-sekunder); margin-top: 8px; }

        .form-card {
            background: white;
            border-radius: 20px;
            padding: 30px 25px;
            box-shadow: 0 10px 30px rgba(74, 144, 217, 0.1);
            margin-bottom: 20px;
        }

        .form-group { margin-bottom: 20px; }

        label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--teks-utama);
        }

        input[type="text"],
        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 14px;
            border: 2px solid #E0E0E0;
            border-radius: 12px;
            font-size: 16px;
            font-family: 'Plus Jakarta Sans', sans-serif;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--langit-biru);
        }

        .level-options { display: flex; gap: 12px; }
        .level-btn {
            flex: 1;
            padding: 15px;
            border: 2px solid #E0E0E0;
            border-radius: 12px;
            background: white;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
        }
        .level-btn:hover { border-color: var(--langit-biru); }
        .level-btn.selected {
            background-color: var(--langit-biru);
            color: white;
            border-color: var(--langit-biru);
        }

        .btn-daftar {
            width: 100%;
            padding: 16px;
            background-color: var(--langit-biru);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
            transition: transform 0.2s;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        .btn-daftar:hover { transform: translateY(-2px); }
        .btn-daftar:disabled { background-color: #D0D0D0; cursor: not-allowed; transform: none; }

        .loading { display: none; text-align: center; margin-top: 15px; color: var(--teks-sekunder); font-size: 14px; }

        .error-msg {
            background: #ffebee;
            color: var(--merah-salah);
            padding: 12px;
            border-radius: 12px;
            font-size: 14px;
            margin-bottom: 15px;
            display: none;
        }

        .success-msg {
            background: #e8f5e9;
            color: var(--hijau-berhasil);
            padding: 12px;
            border-radius: 12px;
            font-size: 14px;
            margin-bottom: 15px;
            display: none;
        }

        .login-link { text-align: center; font-size: 14px; color: var(--teks-sekunder); margin-top: 20px; }
        .login-link a { color: var(--langit-biru); text-decoration: none; font-weight: 600; }
        .login-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>

<div class="header">
    <div class="logo">🌌 Langit Korea</div>
    <div class="subtitle">Daftar akun baru untuk mulai belajar</div>
</div>

<div class="form-card">
    <div class="error-msg" id="errorMsg"></div>
    <div class="success-msg" id="successMsg"></div>

    <div class="form-group">
        <label for="nama">Nama Lengkap</label>
        <input type="text" id="nama" placeholder="Masukkan nama kamu">
    </div>

    <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="email@contoh.com">
    </div>

    <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Minimal 8 karakter">
    </div>

    <div class="form-group">
        <label>Seberapa jauh kamu sudah belajar Korea?</label>
        <div class="level-options">
            <div class="level-btn" data-level="pemula" onclick="selectLevel(this)">Belum Sama Sekali (Pemula)</div>
            <div class="level-btn" data-level="menengah" onclick="selectLevel(this)">Sudah Sedikit (Menengah)</div>
        </div>
    </div>

    <button class="btn-daftar" id="daftarBtn" onclick="daftar()">🚀 Daftar Sekarang</button>
    <div class="loading" id="loading">Mendaftarkan akun...</div>
</div>

<div class="login-link">
    Sudah punya akun? <a href="login.html">Masuk Sekarang</a>
</div>

<script>
    let selectedLevel = null;

    function selectLevel(element) {
        document.querySelectorAll('.level-btn').forEach(btn => btn.classList.remove('selected'));
        element.classList.add('selected');
        selectedLevel = element.getAttribute('data-level');
    }

    async function daftar() {
        const nama = document.getElementById('nama').value;
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const daftarBtn = document.getElementById('daftarBtn');
        const loading = document.getElementById('loading');
        const errorMsg = document.getElementById('errorMsg');
        const successMsg = document.getElementById('successMsg');

        // Reset messages
        errorMsg.style.display = 'none';
        successMsg.style.display = 'none';

        // Validasi
        if (!nama || !email || !password || !selectedLevel) {
            errorMsg.innerText = 'Semua kolom harap diisi ya!';
            errorMsg.style.display = 'block';
            return;
        }

        if (password.length < 8) {
            errorMsg.innerText = 'Password minimal 8 karakter!';
            errorMsg.style.display = 'block';
            return;
        }

        // Disable button & show loading
        daftarBtn.disabled = true;
        loading.style.display = 'block';

        try {
            // 1. Daftar via Supabase Auth
            const { data: authData, error: authError } = await supabase.auth.signUp({
                email: email,
                password: password
            });

            if (authError) throw authError;

            // 2. Simpan data tambahan ke tabel 'users'
            if (authData.user) {
                const { error: dbError } = await supabase
                    .from('users')
                    .insert([
                        {
                            id: authData.user.id, // ID harus sama dengan Auth ID
                            email: email,
                            nama: nama,
                            level_awal: selectedLevel,
                            status: 'free',
                            token_unlock: 0
                        }
                    ]);

                if (dbError) throw dbError;
            }

            // 3. Sukses
            successMsg.innerText = 'Pendaftaran berhasil! Mengarahkan ke beranda...';
            successMsg.style.display = 'block';
            loading.style.display = 'none';

            // 4. Redirect ke home
            setTimeout(() => {
                window.location.href = 'home.html';
            }, 2000);

        } catch (error) {
            loading.style.display = 'none';
            daftarBtn.disabled = false;
            errorMsg.innerText = 'Gagal mendaftar: ' + error.message;
            errorMsg.style.display = 'block';
            console.error('Error:', error);
        }
    }
</script>

</body>
</html>
