<!doctype html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Test Soal - Langit Korea</title>

    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- Supabase Config -->
    <script src="js/supabase-config.js"></script>

    <!-- Database Operations -->
    <script src="js/langit-korea-db.js"></script>

    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
            background: #f0f0f0;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
        }
        .soal-item {
            border: 1px solid #ddd;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 8px;
        }
        .soal-teks {
            font-size: 1.2rem;
            font-family: 'Noto Sans KR', sans-serif;
            margin-bottom: 10px;
        }
        .pilihan {
            margin: 5px 0;
            padding: 8px;
            background: #f9f9f9;
            border-radius: 5px;
        }
        .error { color: red; }
        .success { color: green; }
        button {
            padding: 10px 20px;
            margin: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Test Koneksi Supabase & Soal</h1>

        <div>
            <button onclick="testKoneksi()">1. Test Koneksi</button>
            <button onclick="ambilSoal()">2. Ambil Soal Unit 31</button>
            <button onclick="ambilSemua()">3. Ambil Semua Soal</button>
        </div>

        <div id="status"></div>
        <div id="hasil"></div>
    </div>

    <script>
        async function testKoneksi() {
            const statusEl = document.getElementById('status');
            statusEl.innerHTML = 'Testing koneksi...';

            try {
                if (!window.db) {
                    statusEl.innerHTML = '<p class="error">❌ Supabase client belum siap! Cek supabase-config.js</p>';
                    return;
                }

                const { data, error } = await db.from('soal_eps').select('count').limit(1);

                if (error) {
                    statusEl.innerHTML = `<p class="error">❌ Error: ${error.message}</p>`;
                } else {
                    statusEl.innerHTML = '<p class="success">✅ Koneksi berhasil!</p>';
                }
            } catch (err) {
                statusEl.innerHTML = `<p class="error">❌ Exception: ${err.message}</p>`;
            }
        }

        async function ambilSoal() {
            const hasilEl = document.getElementById('hasil');
            hasilEl.innerHTML = 'Mengambil soal Unit 31...';

            try {
                if (!window.LangitDB) {
                    hasilEl.innerHTML = '<p class="error">❌ LangitDB belum siap!</p>';
                    return;
                }

                const soalList = await LangitDB.ambilSoalEPS(31, 'membaca', 5);

                if (!soalList || soalList.length === 0) {
                    hasilEl.innerHTML = '<p class="error">❌ Tidak ada soal ditemukan!</p>';
                    return;
                }

                let html = `<h3>✅ Berhasil ambil ${soalList.length} soal:</h3>`;
                soalList.forEach((soal, index) => {
                    html += `
                        <div class="soal-item">
                            <div class="soal-teks">${soal.teks_soal}</div>
                            <div class="pilihan">A. ${soal.pilihan_a}</div>
                            <div class="pilihan">B. ${soal.pilihan_b}</div>
                            <div class="pilihan">C. ${soal.pilihan_c}</div>
                            <div class="pilihan">D. ${soal.pilihan_d}</div>
                            <div>Jawaban: ${soal.jawaban}</div>
                        </div>
                    `;
                });

                hasilEl.innerHTML = html;
            } catch (err) {
                hasilEl.innerHTML = `<p class="error">❌ Error: ${err.message}</p>`;
            }
        }

        async function ambilSemua() {
            const hasilEl = document.getElementById('hasil');
            hasilEl.innerHTML = 'Mengambil semua soal...';

            try {
                if (!window.db) return;

                const { data, error } = await db
                    .from('soal_eps')
                    .select('unit, tipe, akses, count')
                    .limit(300);

                if (error) {
                    hasilEl.innerHTML = `<p class="error">❌ Error: ${error.message}</p>`;
                    return;
                }

                // Hitung per unit
                const unitCount = {};
                data.forEach(item => {
                    if (!unitCount[item.unit]) {
                        unitCount[item.unit] = { membaca: 0, mendengar: 0 };
                    }
                    if (item.tipe === 'membaca') {
                        unitCount[item.unit].membaca++;
                    } else {
                        unitCount[item.unit].mendengar++;
                    }
                });

                let html = `<h3>✅ Total: ${data.length} soal</h3>`;
                html += '<table border="1" cellpadding="5" style="border-collapse: collapse; width: 100%;">';
                html += '<tr><th>Unit</th><th>Membaca</th><th>Mendengar</th></tr>';

                Object.keys(unitCount).sort((a,b) => a-b).forEach(unit => {
                    html += `<tr>
                        <td>Unit ${unit}</td>
                        <td>${unitCount[unit].membaca}</td>
                        <td>${unitCount[unit].mendengar}</td>
                    </tr>`;
                });

                html += '</table>';
                hasilEl.innerHTML = html;

            } catch (err) {
                hasilEl.innerHTML = `<p class="error">❌ Error: ${err.message}</p>`;
            }
        }
    </script>
</body>
</html>
